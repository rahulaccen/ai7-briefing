<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI7 Daily Briefing</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0d1117; color: #c9d1d9; min-height: 100vh; display: flex; flex-direction: column; }
  a { color: #58a6ff; text-decoration: none; }
  a:hover { text-decoration: underline; }
  header { background: #161b22; border-bottom: 1px solid #30363d; padding: 16px 24px; display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 1.25rem; font-weight: 700; color: #f0f6fc; letter-spacing: 0.02em; }
  header .logo { font-size: 1.5rem; }
  .layout { display: flex; flex: 1; max-width: 1200px; margin: 0 auto; width: 100%; padding: 24px 16px; gap: 24px; }
  .sidebar { width: 220px; flex-shrink: 0; }
  .sidebar h2 { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: #8b949e; margin-bottom: 12px; }
  .date-list { list-style: none; }
  .date-list li { margin-bottom: 4px; }
  .date-list button { width: 100%; text-align: left; background: none; border: none; color: #8b949e; font-size: 0.875rem; padding: 8px 12px; border-radius: 6px; cursor: pointer; transition: background 0.15s, color 0.15s; }
  .date-list button:hover { background: #21262d; color: #c9d1d9; }
  .date-list button.active { background: #21262d; color: #f0f6fc; font-weight: 600; border-left: 3px solid #58a6ff; }
  .main { flex: 1; min-width: 0; }
  .briefing-date { font-size: 0.875rem; color: #8b949e; margin-bottom: 24px; }
  .company-section { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 20px 24px; margin-bottom: 20px; }
  .company-name { font-size: 1rem; font-weight: 700; color: #f0f6fc; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid #30363d; }
  .news-item { margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid #21262d; }
  .news-item:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
  .news-headline { font-size: 0.9375rem; font-weight: 600; color: #e6edf3; margin-bottom: 6px; }
  .news-summary { font-size: 0.875rem; color: #8b949e; line-height: 1.6; margin-bottom: 6px; }
  .news-source { font-size: 0.8125rem; }
  @media (max-width: 700px) {
    .layout { flex-direction: column; padding: 16px 12px; }
    .sidebar { width: 100%; }
    .date-list { display: flex; flex-wrap: wrap; gap: 8px; }
    .date-list li { margin-bottom: 0; }
    .date-list button { padding: 6px 12px; }
  }
</style>
</head>
<body>
<header>
  <span class="logo">⚡</span>
  <h1>AI7 Daily Briefing</h1>
</header>
<div class="layout">
  <aside class="sidebar">
    <h2>Past Briefings</h2>
    <ul class="date-list" id="date-list"></ul>
  </aside>
  <main class="main" id="main-content">
    <p style="color:#8b949e">Loading briefing...</p>
  </main>
</div>
<script>
const briefings = [{"id": "briefing-2026-06-03", "date": "2026-06-03T03:40:00.000Z", "items": [{"company": "NVIDIA", "headline": "RTX Spark Unveiled at Computex 2026 — NVIDIA's Answer to Apple Silicon", "summary": "At Computex in Taipei, NVIDIA revealed RTX Spark, a new Windows-on-Arm superchip designed around AI, RTX graphics, and unified memory. Devices from ASUS, Dell, and others arrive this fall — the first serious PC platform to challenge Apple Silicon on AI performance. Jensen Huang also declared 'useful AI has arrived and is profitable,' and his endorsement of Marvell as the 'next trillion-dollar company' sent MRVL shares soaring.", "sourceUrl": "https://www.investors.com/news/technology/marvell-stock-mrvl-nvidia-endorsement-computex-2026/"}, {"company": "Snowflake", "headline": "Snowflake Summit 2026: Open Framework for Interoperable Data & AI Announced", "summary": "At Snowflake Summit 2026, Snowflake launched a new open interoperability framework anchored by Apache Iceberg v3 (now generally available), Snowflake Storage, and Horizon Catalog. The aim: eliminate data fragmentation so enterprises can run AI across any cloud without lock-in. New AI services and expanded partnerships with model providers were also announced.", "sourceUrl": "https://www.snowflake.com/en/news/press-releases/snowflake-pioneers-new-open-framework-for-interoperable-enterprise-data-and-ai/"}, {"company": "Palantir", "headline": "Stock Drops 5.7% on Bearish Analyst Projection of 51% Decline", "summary": "Palantir (PLTR) fell 5.74% on June 2 after Motley Fool analyst Keithen Drury published a bearish note projecting the stock falls to $103.50 by year-end — a 51% decline from current levels — citing extreme valuation despite strong fundamentals. Q1 2026 revenue surged 85% YoY to $1.63B, with US commercial revenue up 133%.", "sourceUrl": "https://www.techtimes.com/articles/317619/20260602/palantir-stock-drops-analyst-projects-51-decline-10350-year-end.htm"}, {"company": "Mistral", "headline": "Mistral Eyes US Market with Airbus & BMW Contracts in Hand", "summary": "France's Mistral is making an aggressive push into the US, targeting Wall Street banks and enterprises fresh off signing enterprise supply agreements with Airbus and BMW. A new NBC News feature (June 2) details its strategy of selling sovereign, on-premise AI to sectors wary of US Big Tech. Separately, Mistral, MGX, and Bpifrance announced expansion of Campus AI in France.", "sourceUrl": "https://www.nbcnews.com/tech/tech-news/mistral-selling-wall-street-us-ai-giants-chat-rcna346578"}, {"company": "Anthropic", "headline": "Anthropic Confidentially Files S-1 for IPO, Beating OpenAI to Market", "summary": "Anthropic confirmed on June 1 it has submitted a confidential draft S-1 to the SEC, positioning it ahead of rival OpenAI in the race to go public — potentially as soon as late 2026. The filing follows Anthropic's most recent private valuation and comes as it also expanded Claude Mythos access to 150 organizations across 15+ countries via Project Glasswing, its security vulnerability program.", "sourceUrl": "https://www.euronews.com/business/2026/06/02/worlds-most-valuable-ai-start-up-anthropic-files-for-ipo-five-things-to-know"}, {"company": "Anthropic", "headline": "Claude Mythos Expanded to 150 Organizations in 15+ Countries", "summary": "Alongside its IPO filing, Anthropic expanded Project Glasswing — its AI safety and vulnerability disclosure program — granting Mythos-level model access to 150 critical infrastructure organizations across 15 countries. Mythos represents a significant capabilities jump above Claude 4.6 and had been restricted pending safety work.", "sourceUrl": "https://techcrunch.com/2026/06/02/anthropic-scales-claude-mythos-to-critical-infrastructure-in-15-countries/"}, {"company": "OpenAI", "headline": "CFO Sarah Friar Goes Public on IPO Timeline, New AI Device, and $100B+ Compute Plans", "summary": "OpenAI CFO Sarah Friar appeared on the All-In podcast (June 2) discussing IPO timing, an upcoming new AI device, and plans to spend over $100B on compute infrastructure. The conversation comes as rival Anthropic filed its S-1 and with OpenAI closing a $122B funding round in February 2026 at an $852B valuation — the largest private raise in Silicon Valley history.", "sourceUrl": "https://podcasts.apple.com/gb/podcast/openai-cfo-sarah-friar-on-ipo-ai-rivalries-new-device/id1502871393?i=1000770794236"}, {"company": "Databricks", "headline": "No Major News Today — Data+AI Summit 2026 Coming June 15–18", "summary": "No significant Databricks announcements today. The company's flagship Data+AI Summit 2026 kicks off June 15 in San Francisco, where major product announcements are expected.", "sourceUrl": "https://atlan.com/know/databricks-data-ai-summit-2026-must-attend-sessions/"}]}, {"id": "briefing-2026-06-02", "date": "2026-06-02T16:00:00.000Z", "items": [{"company": "NVIDIA", "headline": "RTX Spark superchip and Vera CPU unveiled at Computex 2026", "summary": "Jensen Huang unveiled the RTX Spark superchip at Computex 2026 — an Arm Grace + Blackwell chip with ~128GB unified memory and nearly 1 petaflop of compute, designed to turn Windows PCs into personal AI agent platforms. NVIDIA also announced the Vera CPU purpose-built for AI agents, with major tech firms committing to adopt it. Intel and AMD stocks fell on the news.", "sourceUrl": "https://nvidianews.nvidia.com/news/nvidia-microsoft-windows-pcs-agents-rtx-spark"}, {"company": "NVIDIA", "headline": "US moves to block Nvidia chip exports to Chinese firms overseas subsidiaries", "summary": "The US Commerce Department issued guidance to halt Nvidia AI chip shipments to overseas subsidiaries of Chinese AI firms, suggesting advanced chips had been reaching Chinese companies through this loophole despite existing restrictions.", "sourceUrl": "https://www.reuters.com/world/china/us-takes-step-halt-nvidia-ai-chip-shipments-chinese-firms-outside-china-2026-05-31/"}, {"company": "Snowflake", "headline": "Snowflake integrates Anthropic Claude into Cortex AI for enterprise agents", "summary": "Snowflake deepened its Anthropic partnership, embedding Claude into Cortex AI to power governed, production-ready AI agents for enterprises, addressing rising demand for AI that operates within data governance frameworks.", "sourceUrl": "https://www.snowflake.com/en/news/press-releases/snowflake-and-anthropic-accelerate-enterprise-ai-adoption-driven-by-rising-demand-for-governed-ai/"}, {"company": "Snowflake", "headline": "Snowflake commits $6B to AWS over five years for AI infrastructure", "summary": "Snowflake announced a $6 billion, five-year commitment to AWS to expand its AI infrastructure, reinforcing its cloud-native positioning as competition for enterprise AI data platforms intensifies.", "sourceUrl": "https://www.instagram.com/p/DZC7xk8CRWz/"}, {"company": "Palantir", "headline": "Norway $2.3T sovereign wealth fund backs human rights review at Palantir", "summary": "Norway sovereign wealth fund voted in favor of all shareholder proposals at Palantir, including a human rights review, a governance pressure signal from one of the worlds largest institutional investors targeting Palantir defense and surveillance work.", "sourceUrl": "https://www.bloomberg.com/news/articles/2026-05-29/-2-3-trillion-norway-fund-backs-human-rights-review-at-palantir"}, {"company": "Mistral", "headline": "Mistral signs Airbus and BMW for manufacturing AI", "summary": "Mistral struck deals with Airbus and BMW to deploy AI across advanced manufacturing, with Airbus acquiring licenses for Mistral full product suite for on-premises and cloud deployment. This marks a major expansion into industrial AI.", "sourceUrl": "https://www.bloomberg.com/news/articles/2026-05-28/mistral-signs-airbus-and-bmw-as-it-brings-ai-to-manufacturing"}, {"company": "Mistral", "headline": "BNP Paribas deepens Mistral partnership; new France data center announced", "summary": "BNP Paribas expanded its Mistral partnership to harden cybersecurity defenses against threats posed by next-generation AI models. Mistral also announced a new 10-megawatt data center in Les Ulis, France, due to open in H2 2026.", "sourceUrl": "https://www.reuters.com/business/finance/bnp-paribas-steps-up-mistral-partnership-bolster-rapid-ai-defences-2026-05-26/"}, {"company": "Anthropic", "headline": "Anthropic confidentially files S-1 IPO prospectus at near-$1T valuation", "summary": "Anthropic filed a confidential draft S-1 with the SEC to begin its IPO process, days after closing a $65B Series H round at a $965B post-money valuation, surpassing OpenAI $852B March valuation. It is expected to be among 2026 most consequential public listings alongside SpaceX and OpenAI.", "sourceUrl": "https://www.anthropic.com/news/confidential-draft-s1-sec"}, {"company": "OpenAI", "headline": "OpenAI revives robotics team, hiring to build and manufacture robots", "summary": "CEO Sam Altman announced the revival of OpenAI Robotics, recruiting hardware, systems, and ML engineers to program and manufacture robots, a direct challenge to Tesla Optimus humanoid program and a pivot from pure software into physical AI.", "sourceUrl": "https://www.thenews.com.pk/latest/1404438-sam-altman-revives-openai-robotics-team-after-five-years"}, {"company": "Databricks", "headline": "No major news today", "summary": "No significant product, funding, or partnership announcements from Databricks in the past 24 hours.", "sourceUrl": ""}]}];

function formatDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric', timeZone: 'UTC' });
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderBriefing(idx) {
  const b = briefings[idx];
  // Group by company
  const companies = [];
  const map = {};
  for (const item of b.items) {
    if (!map[item.company]) { map[item.company] = []; companies.push(item.company); }
    map[item.company].push(item);
  }
  let html = `<div class="briefing-date">${formatDate(b.date)}</div>`;
  for (const co of companies) {
    html += `<div class="company-section"><div class="company-name">${escHtml(co)}</div>`;
    for (const item of map[co]) {
      html += `<div class="news-item">
        <div class="news-headline">${escHtml(item.headline)}</div>
        <div class="news-summary">${escHtml(item.summary)}</div>
        ${item.sourceUrl ? `<div class="news-source"><a href="${escHtml(item.sourceUrl)}" target="_blank" rel="noopener">Source &rarr;</a></div>` : ''}
      </div>`;
    }
    html += `</div>`;
  }
  document.getElementById('main-content').innerHTML = html;
  document.querySelectorAll('.date-list button').forEach((btn, i) => {
    btn.classList.toggle('active', i === idx);
  });
}

const list = document.getElementById('date-list');
briefings.forEach((b, i) => {
  const li = document.createElement('li');
  const btn = document.createElement('button');
  btn.textContent = formatDate(b.date);
  btn.addEventListener('click', () => renderBriefing(i));
  li.appendChild(btn);
  list.appendChild(li);
});

renderBriefing(0);
</script>
</body>
</html>
