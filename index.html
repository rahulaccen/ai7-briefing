<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI7 Daily Briefing</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    header h1 {
      font-size: 1.25rem;
      font-weight: 700;
      color: #f0f6fc;
      letter-spacing: -0.02em;
    }

    header .badge {
      background: #1f6feb;
      color: #fff;
      font-size: 0.7rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .layout {
      display: flex;
      flex: 1;
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
      padding: 0;
    }

    /* Sidebar */
    .sidebar {
      width: 220px;
      flex-shrink: 0;
      border-right: 1px solid #21262d;
      padding: 24px 0;
      position: sticky;
      top: 57px;
      height: calc(100vh - 57px);
      overflow-y: auto;
    }

    .sidebar h2 {
      font-size: 0.7rem;
      font-weight: 600;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 0 20px 12px;
    }

    .sidebar-item {
      display: block;
      padding: 10px 20px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: all 0.15s;
      text-decoration: none;
      color: #8b949e;
      font-size: 0.875rem;
    }

    .sidebar-item:hover {
      background: #161b22;
      color: #c9d1d9;
    }

    .sidebar-item.active {
      border-left-color: #1f6feb;
      background: #161b22;
      color: #58a6ff;
      font-weight: 600;
    }

    .sidebar-item .date-label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: inherit;
    }

    .sidebar-item.active .date-label {
      color: #58a6ff;
    }

    /* Main */
    .main {
      flex: 1;
      padding: 32px 40px;
      min-width: 0;
    }

    .briefing-header {
      margin-bottom: 32px;
      padding-bottom: 20px;
      border-bottom: 1px solid #21262d;
    }

    .briefing-header .briefing-date {
      font-size: 1.5rem;
      font-weight: 700;
      color: #f0f6fc;
    }

    .briefing-header .item-count {
      font-size: 0.8rem;
      color: #8b949e;
      margin-top: 4px;
    }

    /* Company section */
    .company-section {
      margin-bottom: 32px;
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 8px;
      overflow: hidden;
    }

    .company-header {
      background: #1c2128;
      padding: 14px 20px;
      border-bottom: 1px solid #21262d;
    }

    .company-name {
      font-size: 1rem;
      font-weight: 700;
      color: #f0f6fc;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .company-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #1f6feb;
      flex-shrink: 0;
    }

    .news-item {
      padding: 16px 20px;
      border-bottom: 1px solid #21262d;
    }

    .news-item:last-child {
      border-bottom: none;
    }

    .news-headline {
      font-size: 0.95rem;
      font-weight: 600;
      color: #e6edf3;
      margin-bottom: 6px;
      line-height: 1.4;
    }

    .news-summary {
      font-size: 0.875rem;
      color: #8b949e;
      line-height: 1.6;
      margin-bottom: 8px;
    }

    .news-source {
      font-size: 0.78rem;
    }

    .news-source a {
      color: #58a6ff;
      text-decoration: none;
    }

    .news-source a:hover {
      text-decoration: underline;
    }

    /* Company color dots */
    .dot-nvidia { background: #76b900; }
    .dot-anthropic { background: #c25b2b; }
    .dot-openai { background: #10a37f; }
    .dot-palantir { background: #a855f7; }
    .dot-snowflake { background: #29b5e8; }
    .dot-mistral { background: #f97316; }
    .dot-databricks { background: #e63946; }

    /* Mobile */
    @media (max-width: 768px) {
      .layout { flex-direction: column; }
      .sidebar {
        width: 100%;
        height: auto;
        position: static;
        border-right: none;
        border-bottom: 1px solid #21262d;
        padding: 16px 0;
        display: flex;
        gap: 4px;
        overflow-x: auto;
        flex-direction: row;
      }
      .sidebar h2 { display: none; }
      .sidebar-item {
        white-space: nowrap;
        border-left: none;
        border-bottom: 3px solid transparent;
        padding: 8px 16px;
      }
      .sidebar-item.active {
        border-left-color: transparent;
        border-bottom-color: #1f6feb;
      }
      .main { padding: 20px 16px; }
    }
  </style>
</head>
<body>

        "sourceUrl": "https://www.thenews.com.pk/latest/1404438-sam-altman-revives-openai-robotics-team-after-five-years"
      },

];

    const companyDotClass = (company) => {
      const map = {
        'NVIDIA': 'dot-nvidia',
        'Anthropic': 'dot-anthropic',
        'OpenAI': 'dot-openai',
        'Palantir': 'dot-palantir',
        'Snowflake': 'dot-snowflake',
        'Mistral': 'dot-mistral',
        'Databricks': 'dot-databricks',
      };
      return map[company] || '';
    };

    function renderBriefing(briefing) {
      // Group items by company
      const byCompany = {};
      for (const item of briefing.items) {
        if (!byCompany[item.company]) byCompany[item.company] = [];
        byCompany[item.company].push(item);
      }

      const total = briefing.items.length;
      let html = `
        <div class="briefing-header">
          <div class="briefing-date">${briefing.displayDate}</div>
          <div class="item-count">${total} news item${total !== 1 ? 's' : ''} across ${Object.keys(byCompany).length} companies</div>
        </div>
      `;

      for (const [company, items] of Object.entries(byCompany)) {
        const dotClass = companyDotClass(company);
        html += `<div class="company-section">
          <div class="company-header">
            <div class="company-name">
              <span class="company-dot ${dotClass}"></span>
              ${company}
            </div>
          </div>`;

        for (const item of items) {
          const sourceLink = item.sourceUrl
            ? `<a href="${item.sourceUrl}" target="_blank" rel="noopener">Source</a>`
            : '';
          html += `<div class="news-item">
            <div class="news-headline">${escHtml(item.headline)}</div>
            <div class="news-summary">${escHtml(item.summary)}</div>
            ${sourceLink ? `<div class="news-source">${sourceLink}</div>` : ''}
          </div>`;
        }

        html += `</div>`;
      }

      document.getElementById('content').innerHTML = html;
    }

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function buildSidebar(selectedId) {
      const sidebar = document.getElementById('sidebar');
      let html = '<h2>Past Briefings</h2>';
      for (const b of briefings) {
        const active = b.id === selectedId ? ' active' : '';
        html += `<a class="sidebar-item${active}" onclick="selectBriefing('${b.id}')" href="#">
          <span class="date-label">${b.displayDate}</span>
        </a>`;
      }
      sidebar.innerHTML = html;
    }

    function selectBriefing(id) {
      const briefing = briefings.find(b => b.id === id);
      if (!briefing) return;
      renderBriefing(briefing);
      buildSidebar(id);
    }

    // Init: show most recent
    if (briefings.length > 0) {
      selectBriefing(briefings[0].id);
    }
  </script>
</body>
</html>
