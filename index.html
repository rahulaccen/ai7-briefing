const BRIEFINGS=[{"id": "briefing-2026-06-08", "date": "2026-06-08T06:00:00.000Z", "items": [{"company": "NVIDIA", "headline": "Jensen Huang's Korea Tour — GW-Scale AI Factory Deal with Naver, Vera Chip on SK Hynix Memory", "summary": "On a high-profile 5-day South Korea visit (June 5–10), Jensen Huang met with Samsung, SK, LG, Hyundai, and Naver leadership. The headline deal: Nvidia and Naver will co-build a gigawatt-scale AI factory using the Nvidia DSX platform, starting with 55MW in 2027 and scaling to 200MW by 2028 — roughly 4× Naver's largest data center. Separately, Huang confirmed Nvidia's next-gen Vera chip will use SK Hynix memory, boosting Korean semiconductor stocks.", "sourceUrl": "https://www.asiae.co.kr/en/article/2026060809443449390"}, {"company": "NVIDIA", "headline": "Nvidia Launches Nemotron Alliance — 12-Company Open-AI Coalition Including Mistral, Cursor, Perplexity", "summary": "Nvidia unveiled the Nemotron Alliance, a 12-company coalition co-developing open AI foundation models on Nvidia's Nemotron framework. Participants include Mistral AI, Cursor, and Perplexity. Naver became the first Korean company to join, contributing pre-training and reinforcement learning capabilities to boost its HyperCLOVA X model.", "sourceUrl": "https://www.asiae.co.kr/en/article/2026060809443449390"}, {"company": "OpenAI", "headline": "ChatGPT to Become a \"Superapp\" — Coding, Agents, and Automation in One Interface", "summary": "OpenAI will overhaul ChatGPT within weeks, bundling Codex (coding), AI agents, image generation, and automation into a single platform. A senior employee declared \"Chat is dead.\" The pivot targets enterprise users and profitability ahead of IPO, officially ending side projects like Sora.", "sourceUrl": "https://techcrunch.com/2026/06/07/openai-is-still-working-on-that-super-app/"}, {"company": "OpenAI", "headline": "Trump Administration in Talks to Take an Equity Stake in OpenAI", "summary": "The US government is in active discussions to acquire an equity position in OpenAI — an unprecedented move that would give Washington a direct financial interest in one of the world's leading AI labs. No deal terms have been disclosed, but the talks signal deeper alignment between the Trump administration and OpenAI on AI policy and national competitiveness.", "sourceUrl": "https://techcrunch.com/2026/06/06/the-trump-administration-might-take-an-equity-stake-in-openai/"}, {"company": "Anthropic", "headline": "Confidential IPO Filed — $47B Annualized Revenue, 4.7× Growth in 12 Months", "summary": "Anthropic filed a confidential US IPO on June 1, 2026 — the first major AI lab to move toward a public listing. Annualized revenue hit $47B in May 2026, up from ~$10B a year prior (4.7× growth). Valuation range: $60B–$380B. Anthropic is betting its safety-first positioning will command a premium.", "sourceUrl": "https://medium.com/ai-in-plain-english/the-ipo-race-is-on-ai-intelligence-briefing-week-of-june-7-2026-43d0519c8a75"}, {"company": "Anthropic", "headline": "Claude Mythos Preview Now in Hands of Select Partners via Project Glasswing", "summary": "Anthropic is granting enterprise security firms early access to 'Claude Mythos Preview' — its next-gen frontier model — through Project Glasswing, designed to harden critical software against AI-accelerated cyberattacks. Cohesity (trusted by 70%+ of Fortune Global 500) and Intercontinental Exchange (NYSE owner) are among the first participants.", "sourceUrl": "https://scitechanddigital.news/2026/06/08/cohesity-gains-access-to-anthropics-claude-mythos-preview-through-project-glasswing/"}, {"company": "Palantir", "headline": "Partners with Google Cloud — Marketplace Distribution, BigQuery & Gemini Integrations at AIPCon 10", "summary": "Palantir announced a multiyear partnership with Google Cloud at AIPCon 10, including Google Cloud Marketplace distribution and deep integrations with BigQuery and Gemini models. New enterprise deployments announced at Kirkland & Ellis (legal AI), GNP Seguros (first major Mexican customer in insurance), and McCarthy Building (construction). PLTR stock at ~$135.53, P/E ~142.", "sourceUrl": "https://finance.yahoo.com/markets/stocks/articles/palantir-google-cloud-tie-enterprise-090809703.html"}, {"company": "Snowflake", "headline": "Summit 2026 — CoCo, CoWork, and Horizon Context Launch a Full Agentic Enterprise Stack", "summary": "Snowflake used Summit 2026 to launch three layers: CoCo (Cortex Code, for developers), CoWork (for business users — natural-language data access, deep research, collaborative artifacts), and Horizon Context (enterprise intelligence back end collecting and enriching metadata across all connected systems). The combined stack directly challenges Microsoft, Google, Databricks, and OpenAI for the agentic enterprise.", "sourceUrl": "https://siliconangle.com/2026/06/07/snowflake-databricks-model-makers-battle-agentic-client-ai-back-end/"}, {"company": "Databricks", "headline": "CEO Ali Ghodsi: 2026 Is \"A Terrible Year to Go Public\" — No IPO This Year", "summary": "Databricks CEO confirmed the company will not IPO in 2026, calling it 'a terrible year to go public' as OpenAI, Anthropic, and SpaceX are expected to collectively absorb $200B+ in IPO capital. Databricks, valued at $134B, will wait for better conditions. Data + AI Summit runs June 15–18 in San Francisco; Genie's paid tier launches July 6.", "sourceUrl": "https://thenextweb.com/news/databricks-ceo-calls-2026-a-terrible-year-to-go-public-as-spacex-anthropic-and-openai-prepare-to-absorb-200-billion-in-ipo-capital"}, {"company": "Mistral", "headline": "CEO: \"Demand Is Way Above Supply\" as Enterprise AI Adoption Surges in 2026", "summary": "Mistral CEO Arthur Mensch says AI infrastructure demand in 2026 has outpaced the company's supply capacity, echoing broader industry compute constraint signals. Mistral joined NVIDIA's Nemotron Alliance (see NVIDIA), gaining access to Nvidia's open model framework for enterprise deployment. Mistral also announced a premium technology sponsorship of Team Visma | Lease a Bike (pro cycling).", "sourceUrl": "https://www.instagram.com/reel/DZTMHVjjROf/"}]}, {"id": "briefing-2026-06-07", "date": "2026-06-07T06:03:11.000Z", "items": [{"company": "NVIDIA", "headline": "RTX Spark PC Chip Unveiled at Computex 2026", "summary": "Jensen Huang announced the RTX Spark at Computex 2026 in Taipei — a new AI-focused PC chip built in partnership with Microsoft to bring AI inference directly to personal computers. Marks NVIDIA's aggressive push into the consumer AI PC market beyond data centers.", "sourceUrl": "https://www.nvidia.com/en-us/geforce/news/computex-2026-nvidia-geforce-rtx-announcements/"}, {"company": "Anthropic", "headline": "Anthropic Files Confidential S-1 with SEC, Eyes Q4 2026 IPO", "summary": "On June 1, Anthropic confidentially submitted a draft S-1 to the SEC, targeting a Q4 2026 IPO. The filing follows a $65B funding round valuing the company at ~$965B. Annualized revenue is expected to reach ~$50B by end of June 2026.", "sourceUrl": "https://www.cnbc.com/2026/06/01/anthropic-ipo-s1-prospectus.html"}, {"company": "Anthropic", "headline": "Anthropic Warns of Recursive Self-Improvement, Calls for Industry-Wide AI Pause", "summary": "In a June 4 report titled 'When AI Builds Itself,' Anthropic warned AI is approaching a threshold where systems could autonomously design more capable successors. Co-founder Dario Amodei said the risk 'could come sooner than most institutions are prepared for' and proposed a coordinated global pause mechanism among top AI labs.", "sourceUrl": "https://www.dawn.com/news/2005635"}, {"company": "OpenAI", "headline": "OpenAI Plans ChatGPT 'Superapp' Overhaul — Biggest Redesign Since Launch", "summary": "OpenAI is recasting ChatGPT as a 'superapp' with coding tools, AI agents, and partner services in its most ambitious redesign yet. Pre-IPO move designed to drive higher-margin revenue. ChatGPT handles 70% of all AI assistant activity; OpenAI projects $20B revenue in 2026 and $35B in 2027.", "sourceUrl": "https://www.reuters.com/business/openai-plans-chatgpt-superapp-overhaul-ahead-listing-ft-reports-2026-06-07/"}, {"company": "OpenAI", "headline": "Trump Administration in Talks for US Government Equity Stake in OpenAI", "summary": "The Trump administration is negotiating with OpenAI over a US government equity stake, potentially via a 'Public Wealth Fund.' Trump plans meetings with AI companies on a partnership plan; Bernie Sanders is pushing for 50% public ownership. Sam Altman reportedly first floated the concept in early 2025.", "sourceUrl": "https://thenextweb.com/news/trump-wants-the-american-public-to-own-a-piece-of-openai-nobody-knows-how-that-would-work"}, {"company": "Snowflake", "headline": "Snowflake Summit 2026: 26+ New AI Capabilities and Open Interoperability Framework", "summary": "At Summit 2026 (June 1–4, Moscone Center, SF, 20,000+ attendees), Snowflake launched 26+ new product capabilities including CoWork AI agents and a pioneering open framework for interoperable enterprise data and AI. The headline message: enterprise data must be agentic-ready — a direct competitive shot at Databricks and Microsoft Fabric.", "sourceUrl": "https://atlan.com/know/snowflake/summit-2026-announcements/"}, {"company": "Palantir", "headline": "UK MPs Demand Government Exit £330M Palantir NHS Contract", "summary": "A UK parliamentary committee called Palantir's role in public services an 'unacceptable weakness' and 'clear mismatch with UK values,' urging the government to invoke a break clause to exit its £330M ($444M) NHS Federated Data Platform contract signed in 2023. Controversy centres on data sovereignty concerns.", "sourceUrl": "https://www.theregister.com/software/2026/06/03/uk-lawmakers-call-on-government-to-ditch-palantir-nhs-contract/5250150"}, {"company": "Mistral", "headline": "Mistral Signs TCS and Airbus Deals; Targets US Enterprise Market", "summary": "Mistral AI inked two major partnerships: a strategic deal with TCS to build/deploy custom AI models via Mistral Forge, and a multi-year agreement with Airbus covering civil and defence AI under strict data sovereignty controls. Fresh off its Paris AI Now Summit, Mistral is now actively pitching Wall Street banks and US enterprises.", "sourceUrl": "https://www.bankinfosecurity.com/tcs-mistral-ai-sign-strategic-partnership-a-31835"}, {"company": "Databricks", "headline": "Databricks CEO: 2026 Is 'A Terrible Year to Go Public'", "summary": "CEO Ali Ghodsi said the $134B company will skip 2026 IPOs, citing concern that SpaceX, Anthropic, and OpenAI listings will absorb $200B+ in public capital. Separately, Databricks announced its 2026 Data + AI Summit keynote lineup (Chicago, June 8–10) — the world's largest data and AI conference.", "sourceUrl": "https://thenextweb.com/news/databricks-ceo-calls-2026-a-terrible-year-to-go-public-as-spacex-anthropic-and-openai-prepare-to-absorb-200-billion-in-ipo-capital"}]}, {"id": "briefing-2026-06-06", "date": "2026-06-06T16:00:00.000Z", "items": [{"company": "NVIDIA", "headline": "RTX Spark Superchip unveiled at Computex 2026", "summary": "Jensen Huang unveiled the RTX Spark — an Arm CPU + Blackwell GPU package with 1 petaflop of AI compute and 128GB unified memory — designed to turn Windows PCs into an 'agentic AI OS.' Built with Microsoft, it targets Apple Silicon, Intel, and Qualcomm at a ~$5K price point.", "sourceUrl": "https://nvidianews.nvidia.com/news/nvidia-microsoft-windows-pcs-agents-rtx-spark"}, {"company": "NVIDIA", "headline": "$1.3 trillion wiped from chip stocks in single-day selloff", "summary": "On June 5, AI chipmakers including Nvidia lost ~$1.3T in combined market value in a sharp selloff — one of the largest single-day sector losses on record.", "sourceUrl": "https://www.reuters.com/business/media-telecom/chip-selloff-erases-over-1-trillion-stock-market-value-2026-06-05/"}, {"company": "Snowflake", "headline": "Snowflake Summit 2026 draws 20,000+ with agentic AI focus", "summary": "CEO Sridhar Ramaswamy keynoted on 'making AI real for business' through agentic intelligence in San Francisco. Product launches centered on eliminating enterprise data complexity and turning data into autonomous action.", "sourceUrl": "https://diginomica.com/snowflake-summit-2026-quality-products-will-win-out-ai-revolutionizes-very-nature-information-work"}, {"company": "Snowflake", "headline": "Open Interoperability Framework launched for enterprise data and AI", "summary": "Snowflake announced support for Apache Iceberg v3, Snowflake Storage, and Horizon Catalog — an open framework to eliminate data fragmentation across enterprise AI stacks.", "sourceUrl": "https://www.snowflake.com/en/news/press-releases/snowflake-pioneers-new-open-framework-for-interoperable-enterprise-data-and-ai/"}, {"company": "Palantir", "headline": "Kirkland & Ellis deploys Palantir AI for private equity fundraising", "summary": "Top law firm Kirkland & Ellis partnered with Palantir on an exclusive AI-powered fund enterprise platform to transform PE fundraising workflows — a significant beachhead into the $10T private equity industry.", "sourceUrl": "https://www.kirkland.com/news/press-release/2026/06/kirkland-ellis-and-palantir-p-to-transform-pe-fundraising-with-excl-ai-pow-fund-enterprise-plat"}, {"company": "Palantir", "headline": "UK medical journal calls for reduced Palantir NHS role", "summary": "The British Medical Journal concluded Palantir should not hold such a significant role in the NHS and UK public sector, citing a 'clear mismatch with UK values' — adding political pressure to Palantir's UK government contracts.", "sourceUrl": "https://www.bmj.com/content/393/bmj-2026-035692"}, {"company": "Mistral", "headline": "Le Chat rebranded to 'Vibe' — repositioned as agentic work assistant", "summary": "At the AI Now Summit in Paris, Mistral renamed Le Chat to Vibe and relaunched it as a standing agentic assistant integrating Google Workspace, Outlook, SharePoint, and Slack — directly challenging Microsoft Copilot and Google Gemini for enterprise workflow ownership.", "sourceUrl": "https://onehuman.io/news/mistral-vibe-may-2026"}, {"company": "Mistral", "headline": "Full-stack industrial AI strategy + Emmi AI acquisition", "summary": "Mistral announced a comprehensive industrial AI strategy spanning physics models, engineering simulation, and robotics, and acquired Vienna-based Emmi AI to accelerate delivery to industrial clients.", "sourceUrl": "https://www.instagram.com/reel/DZCfUStEwdY/"}, {"company": "Anthropic", "headline": "Confidential S-1 filed for IPO", "summary": "On June 1, Anthropic confidentially submitted a draft S-1 to the SEC, joining OpenAI and SpaceX in a wave of 2026 AI IPOs projected to total ~$200B in combined market cap.", "sourceUrl": "https://www.anthropic.com/news/confidential-draft-s1-sec"}, {"company": "Anthropic", "headline": "Calls for global AI nonproliferation and 'brake pedal' on self-improving models", "summary": "In a high-profile NYT op-ed (June 5), Anthropic argued that a global 'brake pedal' mechanism is needed to halt self-improving AI models before they surpass human control — a notable stance for a frontier AI lab to take publicly.", "sourceUrl": "https://www.nytimes.com/2026/06/05/business/dealbook/anthropic-ai-nonproliferation.html"}, {"company": "OpenAI", "headline": "Trump administration in talks to take government equity stake in OpenAI", "summary": "President Trump and Sam Altman are in active negotiations over the US government acquiring an equity stake in OpenAI, with a Trump executive order (June 2) also asking AI companies to voluntarily share powerful models with the government.", "sourceUrl": "https://www.cnbc.com/2026/06/05/trump-open-ai-altman-stake.html"}, {"company": "OpenAI", "headline": "$16B Stargate campus breaks ground in Michigan", "summary": "OpenAI and Oracle held an official groundbreaking for the $16 billion Stargate AI campus in Saline Township, Michigan — the largest AI infrastructure project in US history.", "sourceUrl": "https://www.cnbc.com/2026/06/01/stargate-project-michigan-live-updates.html"}, {"company": "OpenAI", "headline": "Codex expanded with 6 enterprise business plugins", "summary": "OpenAI launched six new Codex plugins (sales, data analytics, legal, finance, creative production) with plans to integrate Codex directly into ChatGPT — accelerating the race with Anthropic for enterprise AI wallet share.", "sourceUrl": "https://www.marketingprofs.com/opinions/2026/54909/ai-update-june-5-2026-ai-news-and-views-from-the-past-week"}, {"company": "Databricks", "headline": "Data + AI Summit 2026 keynote lineup announced (June 15-18, SF)", "summary": "Databricks revealed the keynote lineup for the world's largest Data + AI conference, scheduled June 15-18 in San Francisco. Expected to showcase new agentic data architecture, enterprise AI features, and product launches.", "sourceUrl": "https://www.databricks.com/company/newsroom/press-releases/databricks-announces-2026-data-ai-summit-keynote-lineup-and"}, {"company": "Databricks", "headline": "CEO Ali Ghodsi rejects IPO — calls 2026 'a terrible year to list'", "summary": "While Anthropic, OpenAI, and SpaceX race toward a combined ~$200B in 2026 IPOs, Databricks CEO Ali Ghodsi is sitting it out, citing poor market conditions as his rationale for staying private.", "sourceUrl": "https://www.facebook.com/thenextweb/posts/spacex-anthropic-and-openai-plan-200b-in-2026-ipos-databricks-skips-itceo-ali-gh/1442301697938612/"}]}, {"id": "briefing-2026-06-05", "date": "2026-06-05T06:00:00.000Z", "items": [{"company": "NVIDIA", "headline": "GTC Taipei 2026 Wraps — RTX Spark PC Superchip Formally Launched", "summary": "NVIDIA's GTC Taipei conference (June 1-4) culminated with Jensen Huang formally demoing RTX Spark — an Arm+Blackwell superchip for Windows PCs with ~128GB unified memory. Devices from Dell, HP, ASUS, and Microsoft Surface Ultra are slated for fall 2026.", "sourceUrl": "https://mashable.com/tech/everything-announced-nvidia-gtc-keynote"}, {"company": "Snowflake", "headline": "Summit 26 Wraps with CoCo and CoWork Launches", "summary": "Snowflake's Summit 26 (June 1-4, San Francisco) delivered CoCo — an enterprise AI coding agent — and CoWork — a personal AI agent for knowledge workers — plus Horizon Catalog for AI governance.", "sourceUrl": "https://www.snowflake.com/en/news/press-releases/snowflake-coco-redefines-enterprise-ai-development-as-the-coding-agent-built-for-faster-easier-and-more-powerful-innovation-anywhere/"}, {"company": "Snowflake", "headline": "Thomson Reuters and Sanofi Announce Snowflake-Powered AI Deployments", "summary": "At Summit 26, Thomson Reuters and Sanofi chose Snowflake for enterprise AI deployments in legal/news/tax products and pharmaceutical drug development respectively.", "sourceUrl": "https://www.snowflake.com/en/news/press-releases/thomson-reuters-powers-trusted-enterprise-ai-at-scale-on-snowflake/"}, {"company": "Palantir", "headline": "GNP Seguros and McCarthy Construction Partner with Palantir at AIPCon 10", "summary": "AIPCon 10 (June 4) added GNP Seguros (Mexico's largest insurer) expanding Palantir Foundry and AIP across all lines of business, and McCarthy Building Companies bringing AI to construction project management.", "sourceUrl": "https://investors.palantir.com/news-details/2026/GNP-Seguros-Announces-Enterprise-Expansion-of-Palantir-Foundry-and-AIP-Across-All-Lines-of-Business/"}, {"company": "Palantir", "headline": "Palantir Now on Google Cloud Marketplace with BigQuery and Gemini Integrations", "summary": "Palantir announced availability on Google Cloud Marketplace with two-way integrations between BigQuery and Foundry, plus deep connectivity between Gemini and AIP — opening Palantir's AI stack to GCP-native enterprises.", "sourceUrl": "https://investors.palantir.com/news-details/2026/Palantir-Announces-Availability-on-Google-Cloud-Marketplace-Including-Two-Way-Integrations-between-BigQuery-and-Foundry-and-Deep-Connectivity-between-Gemini-and-AIP/"}, {"company": "Mistral", "headline": "No major news today — most recent: Vibe unified AI agent launched May 28", "summary": "Mistral's Le Chat was rebranded as Vibe (May 28), a unified agent for long-horizon work and coding. No new announcements in the past 24 hours.", "sourceUrl": "https://mistral.ai/news/vibe-agent"}, {"company": "Anthropic", "headline": "Claude Partner Network Launches Services Track and Partner Hub", "summary": "Anthropic formalized its partner ecosystem (June 3) with a Services Track for system integrators and a Partner Hub for discovery — mirroring how enterprise platform companies structure SI ecosystems ahead of IPO.", "sourceUrl": "https://www.anthropic.com/news/services-track-partner-hub"}, {"company": "Anthropic", "headline": "Year-Long AI-Enabled Cyber Threat Intelligence Report Published", "summary": "Anthropic released a policy report on AI-enabled cyber threats mapped to the MITRE ATT&CK framework (June 3), covering a full year of adversarial AI observations.", "sourceUrl": "https://www.anthropic.com/news/AI-enabled-cyber-threats-mitre-attack"}, {"company": "OpenAI", "headline": "ChatGPT 'Dreaming' Memory System Rolls Out — Factual Recall Jumps from 41% to 83%", "summary": "OpenAI deployed Dreaming v3 (June 4) — a background memory synthesis architecture. Internal evals: factual recall 41%→83%, preference adherence 31%→71%, temporal memory 9%→75%. Rolling out to Plus/Pro users in the US.", "sourceUrl": "https://openai.com/index/chatgpt-memory-dreaming/"}, {"company": "OpenAI", "headline": "Codex Expanded to Every Role, Tool, and Workflow", "summary": "OpenAI expanded Codex (June 2) beyond developers to product managers, designers, and operational roles — directly challenging GitHub Copilot and Anthropic's Claude Code.", "sourceUrl": "https://openai.com/index/codex-for-every-role-tool-workflow/"}, {"company": "Databricks", "headline": "Genie Code Full-Page Beta Launched; Auto-Approve Mode Enables Autonomous Agent Actions", "summary": "Databricks launched full-page Genie Code (Beta, June 3) — a dedicated command center with parallel threads, MCP servers, and custom instructions. Auto-approve mode lets the agent execute tool actions without per-step prompts.", "sourceUrl": "https://docs.databricks.com/aws/en/release-notes/product/2026/june"}, {"company": "Databricks", "headline": "Genie Transitions to Pay-as-You-Go Pricing on July 6; 150 DBU Free Monthly", "summary": "Starting July 6, Databricks Genie moves to pay-as-you-go: 150 free DBUs/month per user (~$10.50 in US East), with overage billed per DBU. Admins can now set spending caps with email alerts.", "sourceUrl": "https://docs.databricks.com/aws/en/release-notes/product/2026/june"}]}, {"id": "briefing-2026-06-04", "date": "2026-06-04T06:00:00.000Z", "items": [{"company": "NVIDIA", "headline": "RTX Spark Superchip Unveiled at Computex 2026", "summary": "NVIDIA debuted RTX Spark — an Arm CPU + Blackwell GPU superchip with 128GB unified memory — targeting Windows laptops and compact desktops. Devices from Dell, HP, and ASUS launch this fall. The chip enables local AI agents to run natively on PCs.", "sourceUrl": "https://nvidianews.nvidia.com/news/nvidia-microsoft-windows-pcs-agents-rtx-spark"}, {"company": "NVIDIA", "headline": "Jensen Huang Dismisses AI Job Loss Fears at Computex", "summary": "Huang called AI job-displacement fears 'complete nonsense,' citing GitHub data showing AI dramatically increases developer output rather than replacing workers.", "sourceUrl": "https://www.cnbc.com/2026/05/31/nvidias-new-chip-to-power-fresh-line-of-windows-laptops-by-dell-hp.html"}, {"company": "OpenAI", "headline": "Sam Altman Lobbies Congress Against Pre-Release AI Approval Rules", "summary": "Altman met with Republican and Democratic lawmakers and Trump officials on June 3, pushing back against proposals requiring government sign-off before releasing new AI models. OpenAI simultaneously released a policy paper proposing industry-led federal governance.", "sourceUrl": "https://www.cnbc.com/2026/06/03/open-ai-altman-congress-trump-eo.html"}, {"company": "OpenAI", "headline": "OpenAI Publishes Frontier AI Safety Blueprint", "summary": "The policy paper proposes a US federal framework for frontier AI safety, resilience, and national security — but splits from the White House on at least two key provisions.", "sourceUrl": "https://www.politico.com/news/2026/06/03/openai-white-house-ai-safety-rules-00948478"}, {"company": "Snowflake", "headline": "Summit 2026 Bets on Four Pillars for the Agentic Enterprise", "summary": "Snowflake unveiled Cortex Sense, Iceberg v3, Datastream, and Adaptive Compute as its core infrastructure bets, with CEO Sridhar Ramaswamy framing the entire platform around making AI agents production-ready for enterprise.", "sourceUrl": "https://futurumgroup.com/insights/snowflake-summit-2026-four-infrastructure-bets-that-determine-whether-the-agentic-enterprise-delivers/"}, {"company": "Snowflake", "headline": "Horizon Catalog Launched for Enterprise AI Governance", "summary": "Snowflake's new Horizon Catalog centralizes governance, security, and context across enterprise AI workloads — directly addressing the compliance and auditability challenges of at-scale AI agent deployment.", "sourceUrl": "https://www.snowflake.com/en/news/press-releases/snowflake-advances-trusted-ai-with-snowflake-horizon-catalog-centralizing-governance-context-and-security-across-the-enterprise/"}, {"company": "Palantir", "headline": "PLTR Falls 6.5% Despite Record FY2026 Guidance Raise", "summary": "Palantir shares dropped to ~$142 on June 3-4, despite management raising FY2026 revenue guidance to a $7.656B midpoint — a 71% growth rate and the largest guidance raise in company history.", "sourceUrl": "https://www.fool.com/investing/2026/06/03/why-palantir-stock-is-sinking-today/"}, {"company": "Palantir", "headline": "Shareholders Vote Down Human Rights Proposals at Annual Meeting", "summary": "Investors rejected two proposals requesting independent reports on Palantir's AI surveillance software human rights impact. Government revenue on track to hit $3.8B in 2026 (up from $2.4B).", "sourceUrl": "https://www.barrons.com/articles/palantir-stock-price-human-rights-99fc4356"}, {"company": "Anthropic", "headline": "Claude Opus 4.8 Released — Near-Generational Leap in Agentic Performance", "summary": "Anthropic released Opus 4.8 with stronger coding, agentic task, and professional work capabilities. Pricing unchanged at $5/$25 per million tokens. Early testers describe the improvement as close to a full model generation upgrade.", "sourceUrl": "https://www.anthropic.com/news/claude-opus-4-8"}, {"company": "Anthropic", "headline": "Project Glasswing Expands; Claude Security Launches", "summary": "Anthropic expanded access to its powerful Claude Mythos Preview model to 150+ organizations and launched Claude Security — a product that scans enterprise codebases using frontier models.", "sourceUrl": "https://www.anthropic.com/news/expanding-project-glasswing"}, {"company": "Mistral", "headline": "Emmi AI Founders Fund a Rival Just 13 Days After Mistral Acquisition", "summary": "Mistral acquired Austrian physics-AI startup Emmi AI on May 19. Thirteen days later, two of Emmi's own co-founders funded a competing startup — raising questions about integration and talent retention.", "sourceUrl": "https://www.frenchtechjournal.com/mistral-bought-a-physics-ai-startup-then-its-founders-funded-rival-np/"}, {"company": "Mistral", "headline": "CEO Arthur Mensch on Building Europe's $14B AI Challenger", "summary": "Mensch spoke publicly about Mistral's $14B valuation and the AI compute race, arguing that access to compute ('AI tokens') is becoming the critical strategic resource.", "sourceUrl": "https://www.msn.com/en-us/money/news/mistral-ceo-arthur-mensch-on-building-europe-s-14-billion-ai-challenger/vi-AA24H6nO"}]}, {"id": "briefing-2026-06-03", "date": "2026-06-03T06:00:00.000Z", "items": [{"company": "NVIDIA", "headline": "Jensen Huang Unveils RTX Spark at Computex 2026, Eyes Full AI Stack Ownership", "summary": "NVIDIA CEO introduced the RTX Spark at Computex 2026 in Taipei — a powerful laptop/PC superchip designed to bring advanced local AI capabilities to slim Windows laptops and compact desktops. CNBC framed it as Huang's bid to 'own every part of the AI stack.'", "sourceUrl": "https://www.cnbc.com/2026/06/02/nvidias-new-pc-chips-are-ceos-bid-to-own-every-part-of-ai-stack.html"}, {"company": "Anthropic", "headline": "Anthropic Files Confidentially for IPO, Beats OpenAI to the Starting Line", "summary": "Anthropic submitted a confidential draft S-1 to the SEC on June 1, 2026 — making it the world's most valuable AI startup to formally begin the IPO process, positioning Anthropic ahead of rival OpenAI.", "sourceUrl": "https://www.euronews.com/business/2026/06/02/worlds-most-valuable-ai-start-up-anthropic-files-for-ipo-five-things-to-know"}, {"company": "OpenAI", "headline": "OpenAI CFO Details IPO, New AI Device, and $100B+ Compute Spending; Florida Sues OpenAI", "summary": "CFO Sarah Friar spoke about OpenAI's IPO timeline, forthcoming AI hardware, and $100B+ compute spend commitment. Florida became the first US state to sue OpenAI. Senator Bernie Sanders proposed the federal government take 50% ownership of OpenAI and Anthropic.", "sourceUrl": "https://finance.yahoo.com/video/spacex-openai-anthropic-ipos-investors-141627771.html"}, {"company": "Palantir", "headline": "Palantir Stock Falls 5.3% as Trump Executive Order Rattles AI Sector", "summary": "Palantir shares dropped 5.3% after Trump signed an EO requiring AI companies to share previews of frontier models with the government. Despite the dip, Q1 2026 revenue surged 85% YoY to $1.63B, with US commercial revenue up 133% to $595M.", "sourceUrl": "https://finance.yahoo.com/markets/stocks/articles/why-palantir-stock-sinking-today-192459194.html"}, {"company": "Snowflake", "headline": "Snowflake Summit 2026: Iceberg v3 GA, Natoma Acquisition, $6B AWS Commitment", "summary": "Snowflake's annual Summit delivered: Apache Iceberg v3 GA, plans to acquire Natoma (MCP platform), a $6B AWS infrastructure commitment, and CoWork personal AI agent for knowledge workers.", "sourceUrl": "https://www.snowflake.com/en/news/press-releases/snowflake-pioneers-new-open-framework-for-interoperable-enterprise-data-and-ai/"}, {"company": "Mistral", "headline": "Mistral Launches Aggressive US Push Targeting Wall Street Banks; Hits Copilot Studio", "summary": "France's Mistral is aggressively courting American banks and enterprises. CEO Arthur Mensch projects €1B+ in 2026 revenue. Microsoft also made Mistral Medium 3.5 available in Copilot Studio.", "sourceUrl": "https://www.nbcnews.com/tech/tech-news/mistral-selling-wall-street-us-ai-giants-chat-rcna346578"}, {"company": "Databricks", "headline": "Data + AI Summit 2026 Coming June 15–18 in San Francisco", "summary": "No major product announcements from Databricks today. The company's flagship Data + AI Summit 2026 is scheduled for June 15–18 in San Francisco, featuring 759 sessions over 4 days.", "sourceUrl": "https://atlan.com/know/databricks-data-ai-summit-2026-must-attend-sessions/"}]}, {"id": "briefing-2026-06-02", "date": "2026-06-02T16:00:00.000Z", "items": [{"company": "NVIDIA", "headline": "RTX Spark superchip and Vera CPU unveiled at Computex 2026", "summary": "Jensen Huang unveiled the RTX Spark superchip at Computex 2026 — an Arm Grace + Blackwell chip with ~128GB unified memory, plus the Vera CPU purpose-built for AI agents.", "sourceUrl": "https://nvidianews.nvidia.com/news/nvidia-microsoft-windows-pcs-agents-rtx-spark"}, {"company": "NVIDIA", "headline": "US moves to block Nvidia chip exports to Chinese firms' overseas subsidiaries", "summary": "The US Commerce Department issued guidance to halt Nvidia AI chip shipments to overseas subsidiaries of Chinese AI firms, closing a loophole in existing export restrictions.", "sourceUrl": "https://www.reuters.com/world/china/us-takes-step-halt-nvidia-ai-chip-shipments-chinese-firms-outside-china-2026-05-31/"}, {"company": "Snowflake", "headline": "Snowflake integrates Anthropic Claude into Cortex AI for enterprise agents", "summary": "Snowflake deepened its Anthropic partnership, embedding Claude into Cortex AI to power governed, production-ready AI agents for enterprises.", "sourceUrl": "https://www.snowflake.com/en/news/press-releases/snowflake-and-anthropic-accelerate-enterprise-ai-adoption-driven-by-rising-demand-for-governed-ai/"}, {"company": "Snowflake", "headline": "Snowflake commits $6B to AWS over five years for AI infrastructure", "summary": "Snowflake announced a $6 billion, five-year commitment to AWS to expand its AI infrastructure, reinforcing its cloud-native positioning.", "sourceUrl": "https://www.instagram.com/p/DZC7xk8CRWz/"}, {"company": "Palantir", "headline": "Norway $2.3T sovereign wealth fund backs human rights review at Palantir", "summary": "Norway's sovereign wealth fund voted in favor of all shareholder proposals at Palantir including a human rights review — governance pressure from one of the world's largest institutional investors.", "sourceUrl": "https://www.bloomberg.com/news/articles/2026-05-29/-2-3-trillion-norway-fund-backs-human-rights-review-at-palantir"}, {"company": "Mistral", "headline": "Mistral signs Airbus and BMW for manufacturing AI", "summary": "Mistral struck deals with Airbus and BMW to deploy AI across advanced manufacturing, with Airbus acquiring licenses for Mistral's full product suite for on-premises and cloud deployment.", "sourceUrl": "https://www.bloomberg.com/news/articles/2026-05-28/mistral-signs-airbus-and-bmw-as-it-brings-ai-to-manufacturing"}, {"company": "Mistral", "headline": "BNP Paribas deepens Mistral partnership; new France data center announced", "summary": "BNP Paribas expanded its Mistral partnership to harden cybersecurity defenses. Mistral also announced a new 10MW data center in Les Ulis, France, due in H2 2026.", "sourceUrl": "https://www.reuters.com/business/finance/bnp-paribas-steps-up-mistral-partnership-bolster-rapid-ai-defences-2026-05-26/"}, {"company": "Anthropic", "headline": "Anthropic confidentially files S-1 IPO prospectus at near-$1T valuation", "summary": "Anthropic filed a confidential draft S-1 with the SEC after closing a $65B Series H round at a $965B post-money valuation, surpassing OpenAI's $852B March valuation.", "sourceUrl": "https://www.anthropic.com/news/confidential-draft-s1-sec"}, {"company": "OpenAI", "headline": "OpenAI revives robotics team, hiring to build and manufacture robots", "summary": "CEO Sam Altman announced the revival of OpenAI Robotics, recruiting hardware, systems, and ML engineers — a direct challenge to Tesla Optimus and a pivot from pure software into physical AI.", "sourceUrl": "https://www.thenews.com.pk/latest/1404438-sam-altman-revives-openai-robotics-team-after-five-years"}, {"company": "Databricks", "headline": "No major news today", "summary": "No significant product, funding, or partnership announcements from Databricks in the past 24 hours.", "sourceUrl": ""}]}];
const COMPANIES=["Databricks","NVIDIA","Snowflake","Palantir","Mistral","Anthropic","OpenAI"];
const CHIP_CLASS={"NVIDIA":"c-nvidia","OpenAI":"c-openai","Anthropic":"c-anthropic","Palantir":"c-palantir","Snowflake":"c-snowflake","Databricks":"c-databricks","Mistral":"c-mistral"};
let selDate=BRIEFINGS[0]?BRIEFINGS[0].id:null;
let selCo=null;
function fmtDate(iso){const d=new Date(iso);return d.toLocaleDateString('en-US',{weekday:'short',year:'numeric',month:'short',day:'numeric'});}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function renderSidebar(){
  let h='<h2>Past Briefings</h2>';
  BRIEFINGS.forEach(b=>{
    const act=!selCo&&b.id===selDate;
    const dim=!!selCo;
    h+=`<button class="sidebar-btn${act?' active':''}${dim?' dimmed':''}" onclick="pickDate('${b.id}')"><div class="sidebar-date">${fmtDate(b.date)}</div><div class="sidebar-count">${b.items.length} items</div></button>`;
  });
  document.getElementById('sidebar').innerHTML=h;
}
function renderMain(){
  let h='<div class="filter-bar">';
  h+=`<button class="chip${selCo===null?' active':''}" onclick="pickCo(null)">All</button>`;
  COMPANIES.forEach(c=>{const cl=CHIP_CLASS[c]||'';h+=`<button class="chip ${cl}${selCo===c?' active':''}" onclick="pickCo('${c}')">${c}</button>`;});
  h+='</div>';
  if(selCo!==null){
    const matching=BRIEFINGS.filter(b=>b.items.some(i=>i.company===selCo));
    const total=matching.reduce((s,b)=>s+b.items.filter(i=>i.company===selCo).length,0);
    h+=`<div class="banner"><strong>Showing all ${esc(selCo)} news across ${matching.length} briefing${matching.length!==1?'s':''} (${total} item${total!==1?'s':''}).</strong> <a onclick="pickCo(null)">Click All to return to daily view.</a></div>`;
    if(!matching.length){h+='<p class="empty-msg">No historical news found for this company.</p>';}
    else{matching.forEach(b=>{const items=b.items.filter(i=>i.company===selCo);if(!items.length)return;h+=`<div class="date-group-label">${fmtDate(b.date)}</div>`;items.forEach(i=>{h+=card(i,false);});});}
  } else {
    const b=BRIEFINGS.find(x=>x.id===selDate);
    if(!b){h+='<p class="empty-msg">No briefing selected.</p>';}
    else{
      const byC={};b.items.forEach(i=>{if(!byC[i.company])byC[i.company]=[];byC[i.company].push(i);});
      const order=COMPANIES.filter(c=>byC[c]);Object.keys(byC).forEach(c=>{if(!order.includes(c))order.push(c);});
      if(!order.length){h+='<p class="empty-msg">No news items for this date.</p>';}
      order.forEach(co=>{
        const dot=`<span class="cdot cd-${co}"></span>`;
        h+=`<div class="company-block"><div class="company-label">${dot}${esc(co)}</div>`;
        byC[co].forEach(i=>{h+=card(i,false);});
        h+='</div>';
      });
    }
  }
  document.getElementById('main').innerHTML=h;
}
function card(item,showCo){
  const src=item.sourceUrl?`<div class="news-source"><a href="${esc(item.sourceUrl)}" target="_blank" rel="noopener">Source ↗</a></div>`:'';
  const co=showCo?`<div style="font-size:.7rem;color:#8b949e;font-weight:600;text-transform:uppercase;margin-bottom:3px">${esc(item.company)}</div>`:'';
  return `<div class="news-card">${co}<div class="news-headline">${esc(item.headline)}</div><div class="news-summary">${esc(item.summary)}</div>${src}</div>`;
}
function pickDate(id){selDate=id;selCo=null;renderSidebar();renderMain();}
function pickCo(co){selCo=co;renderSidebar();renderMain();}
renderSidebar();renderMain();
</script>
