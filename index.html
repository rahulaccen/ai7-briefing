<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI7 Daily Briefing</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d0d0d; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; min-height: 100vh; }
  a { color: #60a5fa; text-decoration: none; }
  a:hover { text-decoration: underline; }
  .layout { display: flex; min-height: 100vh; }
  /* Sidebar */
  .sidebar { width: 220px; min-width: 180px; background: #141414; border-right: 1px solid #222; padding: 24px 0; flex-shrink: 0; }
  .sidebar-title { font-size: 11px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 1.5px; padding: 0 20px 12px; }
  .sidebar-date { display: block; padding: 10px 20px; font-size: 14px; color: #bbb; cursor: pointer; border-left: 3px solid transparent; transition: all 0.15s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sidebar-date:hover { color: #fff; background: #1a1a1a; border-left-color: #444; }
  .sidebar-date.active { color: #fff; background: #1e1e2e; border-left-color: #60a5fa; font-weight: 600; }
  .sidebar-date.dimmed { opacity: 0.4; }
  /* Main */
  .main { flex: 1; padding: 32px 40px; max-width: 860px; }
  .main-header { margin-bottom: 28px; }
  .main-header h1 { font-size: 26px; font-weight: 700; color: #fff; letter-spacing: -0.5px; }
  .main-header .sub { font-size: 13px; color: #666; margin-top: 4px; }
  /* Filter chips */
  .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 28px; }
  .chip { padding: 5px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; border: 2px solid transparent; transition: all 0.15s; background: #1a1a1a; color: #aaa; }
  .chip:hover { color: #fff; border-color: #444; }
  .chip.active { color: #fff; }
  /* Banner */
  .filter-banner { background: #1a1f2e; border: 1px solid #2d3a5c; border-radius: 8px; padding: 12px 16px; margin-bottom: 20px; font-size: 13px; color: #93c5fd; display: none; }
  .filter-banner.show { display: block; }
  .filter-banner a { color: #60a5fa; font-weight: 600; cursor: pointer; }
  /* Company section */
  .company-section { margin-bottom: 32px; }
  .company-name { font-size: 16px; font-weight: 700; color: #fff; margin-bottom: 12px; padding-bottom: 6px; border-bottom: 2px solid #222; display: flex; align-items: center; gap: 8px; }
  .company-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
  /* Date group (company filter mode) */
  .date-group { margin-bottom: 24px; }
  .date-group-label { font-size: 11px; font-weight: 700; color: #555; text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 10px; }
  /* News item */
  .news-item { background: #141414; border: 1px solid #1e1e1e; border-radius: 8px; padding: 14px 16px; margin-bottom: 10px; transition: border-color 0.15s; }
  .news-item:hover { border-color: #333; }
  .news-headline { font-size: 14px; font-weight: 600; color: #e8e8e8; margin-bottom: 5px; line-height: 1.4; }
  .news-summary { font-size: 13px; color: #999; line-height: 1.55; }
  .news-source { margin-top: 6px; }
  .news-source a { font-size: 11px; color: #555; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; background: #1e1e1e; padding: 2px 8px; border-radius: 4px; }
  .news-source a:hover { color: #aaa; text-decoration: none; background: #252525; }
  /* No news */
  .no-news { color: #555; font-size: 14px; padding: 20px 0; }
  @media (max-width: 700px) {
    .layout { flex-direction: column; }
    .sidebar { width: 100%; border-right: none; border-bottom: 1px solid #222; padding: 16px 0; display: flex; flex-direction: column; }
    .sidebar-dates { display: flex; overflow-x: auto; padding: 0 16px; gap: 8px; }
    .sidebar-date { padding: 8px 14px; border-left: none; border-bottom: 2px solid transparent; white-space: nowrap; font-size: 13px; }
    .sidebar-date.active { border-left-color: transparent; border-bottom-color: #60a5fa; }
    .main { padding: 20px 16px; }
  }
</style>
</head>
<body>
<div class="layout">
  <nav class="sidebar">
    <div class="sidebar-title">Briefings</div>
    <div class="sidebar-dates" id="sidebarDates"></div>
  </nav>
  <main class="main">
    <div class="main-header">
      <h1>AI7 Daily Briefing</h1>
      <div class="sub" id="mainSub"></div>
    </div>
    <div class="chips" id="chips"></div>
    <div class="filter-banner" id="filterBanner"></div>
    <div id="content"></div>
  </main>
</div>
<script>
const BRIEFINGS = [{"id": "briefing-2026-06-06", "date": "2026-06-06T16:00:00.000Z", "items": [{"company": "NVIDIA", "headline": "RTX Spark Superchip unveiled at Computex 2026", "summary": "Jensen Huang unveiled the RTX Spark \u2014 an Arm CPU + Blackwell GPU package with 1 petaflop of AI compute and 128GB unified memory \u2014 designed to turn Windows PCs into an 'agentic AI OS.' Built with Microsoft, it targets Apple Silicon, Intel, and Qualcomm at a ~$5K price point.", "sourceUrl": "https://nvidianews.nvidia.com/news/nvidia-microsoft-windows-pcs-agents-rtx-spark"}, {"company": "NVIDIA", "headline": "$1.3 trillion wiped from chip stocks in single-day selloff", "summary": "On June 5, AI chipmakers including Nvidia lost ~$1.3T in combined market value in a sharp selloff \u2014 one of the largest single-day sector losses on record.", "sourceUrl": "https://www.reuters.com/business/media-telecom/chip-selloff-erases-over-1-trillion-stock-market-value-2026-06-05/"}, {"company": "Snowflake", "headline": "Snowflake Summit 2026 draws 20,000+ with agentic AI focus", "summary": "CEO Sridhar Ramaswamy keynoted on 'making AI real for business' through agentic intelligence in San Francisco. Product launches centered on eliminating enterprise data complexity and turning data into autonomous action.", "sourceUrl": "https://diginomica.com/snowflake-summit-2026-quality-products-will-win-out-ai-revolutionizes-very-nature-information-work"}, {"company": "Snowflake", "headline": "Open Interoperability Framework launched for enterprise data and AI", "summary": "Snowflake announced support for Apache Iceberg v3, Snowflake Storage, and Horizon Catalog \u2014 an open framework to eliminate data fragmentation across enterprise AI stacks.", "sourceUrl": "https://www.snowflake.com/en/news/press-releases/snowflake-pioneers-new-open-framework-for-interoperable-enterprise-data-and-ai/"}, {"company": "Palantir", "headline": "Kirkland & Ellis deploys Palantir AI for private equity fundraising", "summary": "Top law firm Kirkland & Ellis partnered with Palantir on an exclusive AI-powered fund enterprise platform to transform PE fundraising workflows \u2014 a significant beachhead into the $10T private equity industry.", "sourceUrl": "https://www.kirkland.com/news/press-release/2026/06/kirkland-ellis-and-palantir-p-to-transform-pe-fundraising-with-excl-ai-pow-fund-enterprise-plat"}, {"company": "Palantir", "headline": "UK medical journal calls for reduced Palantir NHS role", "summary": "The British Medical Journal concluded Palantir should not hold such a significant role in the NHS and UK public sector, citing a 'clear mismatch with UK values' \u2014 adding political pressure to Palantir's UK government contracts.", "sourceUrl": "https://www.bmj.com/content/393/bmj-2026-035692"}, {"company": "Mistral", "headline": "Le Chat rebranded to 'Vibe' \u2014 repositioned as agentic work assistant", "summary": "At the AI Now Summit in Paris, Mistral renamed Le Chat to Vibe and relaunched it as a standing agentic assistant integrating Google Workspace, Outlook, SharePoint, and Slack \u2014 directly challenging Microsoft Copilot and Google Gemini for enterprise workflow ownership.", "sourceUrl": "https://onehuman.io/news/mistral-vibe-may-2026"}, {"company": "Mistral", "headline": "Full-stack industrial AI strategy + Emmi AI acquisition", "summary": "Mistral announced a comprehensive industrial AI strategy spanning physics models, engineering simulation, and robotics, and acquired Vienna-based Emmi AI to accelerate delivery to industrial clients.", "sourceUrl": "https://www.instagram.com/reel/DZCfUStEwdY/"}, {"company": "Anthropic", "headline": "Confidential S-1 filed for IPO", "summary": "On June 1, Anthropic confidentially submitted a draft S-1 to the SEC, joining OpenAI and SpaceX in a wave of 2026 AI IPOs projected to total ~$200B in combined market cap.", "sourceUrl": "https://www.anthropic.com/news/confidential-draft-s1-sec"}, {"company": "Anthropic", "headline": "Calls for global AI nonproliferation and 'brake pedal' on self-improving models", "summary": "In a high-profile NYT op-ed (June 5), Anthropic argued that a global 'brake pedal' mechanism is needed to halt self-improving AI models before they surpass human control \u2014 a notable stance for a frontier AI lab to take publicly.", "sourceUrl": "https://www.nytimes.com/2026/06/05/business/dealbook/anthropic-ai-nonproliferation.html"}, {"company": "OpenAI", "headline": "Trump administration in talks to take government equity stake in OpenAI", "summary": "President Trump and Sam Altman are in active negotiations over the US government acquiring an equity stake in OpenAI, with a Trump executive order (June 2) also asking AI companies to voluntarily share powerful models with the government.", "sourceUrl": "https://www.cnbc.com/2026/06/05/trump-open-ai-altman-stake.html"}, {"company": "OpenAI", "headline": "$16B Stargate campus breaks ground in Michigan", "summary": "OpenAI and Oracle held an official groundbreaking for the $16 billion Stargate AI campus in Saline Township, Michigan \u2014 the largest AI infrastructure project in US history.", "sourceUrl": "https://www.cnbc.com/2026/06/01/stargate-project-michigan-live-updates.html"}, {"company": "OpenAI", "headline": "Codex expanded with 6 enterprise business plugins", "summary": "OpenAI launched six new Codex plugins (sales, data analytics, legal, finance, creative production) with plans to integrate Codex directly into ChatGPT \u2014 accelerating the race with Anthropic for enterprise AI wallet share.", "sourceUrl": "https://www.marketingprofs.com/opinions/2026/54909/ai-update-june-5-2026-ai-news-and-views-from-the-past-week"}, {"company": "Databricks", "headline": "Data + AI Summit 2026 keynote lineup announced (June 15-18, SF)", "summary": "Databricks revealed the keynote lineup for the world's largest Data + AI conference, scheduled June 15-18 in San Francisco. Expected to showcase new agentic data architecture, enterprise AI features, and product launches.", "sourceUrl": "https://www.databricks.com/company/newsroom/press-releases/databricks-announces-2026-data-ai-summit-keynote-lineup-and"}, {"company": "Databricks", "headline": "CEO Ali Ghodsi rejects IPO \u2014 calls 2026 'a terrible year to list'", "summary": "While Anthropic, OpenAI, and SpaceX race toward a combined ~$200B in 2026 IPOs, Databricks CEO Ali Ghodsi is sitting it out, citing poor market conditions as his rationale for staying private.", "sourceUrl": "https://www.facebook.com/thenextweb/posts/spacex-anthropic-and-openai-plan-200b-in-2026-ipos-databricks-skips-itceo-ali-gh/1442301697938612/"}]}, {"id": "briefing-2026-06-05", "date": "2026-06-05T06:00:00.000Z", "items": [{"company": "NVIDIA", "headline": "GTC Taipei 2026 Wraps \u2014 RTX Spark PC Superchip Formally Launched"}, {"company": "Snowflake", "headline": "Summit 26: CoCo and CoWork Agents Launched"}, {"company": "Palantir", "headline": "AIPCon 10: GNP Seguros and McCarthy Construction Partner"}, {"company": "Mistral", "headline": "No major news \u2014 most recent: Vibe unified AI agent launched May 28"}, {"company": "Anthropic", "headline": "Claude Partner Network Launches Services Track"}, {"company": "OpenAI", "headline": "ChatGPT Dreaming Memory System Rolls Out \u2014 Recall Jumps 41% to 83%"}, {"company": "Databricks", "headline": "Genie Code Full-Page Beta Launched; Auto-Approve Mode Enabled"}]}, {"id": "briefing-2026-06-04", "date": "2026-06-04T06:00:00.000Z", "items": [{"company": "NVIDIA", "headline": "RTX Spark Superchip Unveiled at Computex 2026"}, {"company": "Snowflake", "headline": "Summit 2026: Four Infrastructure Pillars for Agentic Enterprise"}, {"company": "Palantir", "headline": "PLTR Falls 6.5% Despite Record FY2026 Guidance Raise"}, {"company": "Mistral", "headline": "Emmi AI Founders Fund a Rival 13 Days After Acquisition"}, {"company": "Anthropic", "headline": "Claude Opus 4.8 Released \u2014 Near-Generational Leap"}, {"company": "OpenAI", "headline": "Sam Altman Lobbies Congress Against Pre-Release AI Rules"}, {"company": "Databricks", "headline": "Genie Transitions to Pay-as-You-Go Pricing on July 6"}]}, {"id": "briefing-2026-06-03", "date": "2026-06-03T06:00:00.000Z", "items": [{"company": "NVIDIA", "headline": "Jensen Huang Unveils RTX Spark at Computex 2026"}, {"company": "Anthropic", "headline": "Anthropic Files Confidentially for IPO"}, {"company": "OpenAI", "headline": "Sam Altman Lobbies Congress; Florida Sues OpenAI"}, {"company": "Palantir", "headline": "PLTR Falls 5.3% as Trump Executive Order Rattles AI Sector"}, {"company": "Snowflake", "headline": "Summit 2026: Iceberg v3 GA, Natoma Acquisition, $6B AWS Commitment"}, {"company": "Mistral", "headline": "Mistral Launches Aggressive US Push Targeting Wall Street Banks"}, {"company": "Databricks", "headline": "Data + AI Summit 2026 Coming June 15-18 in San Francisco"}]}, {"id": "briefing-2026-06-02", "date": "2026-06-02T16:00:00.000Z", "items": [{"company": "NVIDIA", "headline": "RTX Spark Superchip and Vera CPU Unveiled at Computex 2026"}, {"company": "Snowflake", "headline": "Snowflake Integrates Anthropic Claude into Cortex AI"}, {"company": "Palantir", "headline": "Norway $2.3T Sovereign Wealth Fund Backs Human Rights Review"}, {"company": "Mistral", "headline": "Mistral Signs Airbus and BMW for Manufacturing AI"}, {"company": "Anthropic", "headline": "Anthropic Confidentially Files S-1 IPO Prospectus"}, {"company": "OpenAI", "headline": "OpenAI Revives Robotics Team"}, {"company": "Databricks", "headline": "No major news today"}]}];
const COMPANY_COLORS = {"NVIDIA": "#76b900", "Snowflake": "#29b5e8", "Palantir": "#e85d04", "Mistral": "#7c3aed", "Anthropic": "#d97706", "OpenAI": "#10a37f", "Databricks": "#ff3621"};
const ALL_COMPANIES = ["Databricks", "NVIDIA", "Snowflake", "Palantir", "Mistral", "Anthropic", "OpenAI"];

let selectedDateIdx = 0;
let selectedCompany = 'All';

function fmtDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric', timeZone:'UTC'});
}

function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderSidebar() {
  const el = document.getElementById('sidebarDates');
  el.innerHTML = BRIEFINGS.map((b, i) => {
    const cls = [
      'sidebar-date',
      i === selectedDateIdx && selectedCompany === 'All' ? 'active' : '',
      selectedCompany !== 'All' ? 'dimmed' : ''
    ].filter(Boolean).join(' ');
    return `<span class="${cls}" onclick="selectDate(${i})">${escHtml(fmtDate(b.date))}</span>`;
  }).join('');
}

function renderChips() {
  const el = document.getElementById('chips');
  const companies = ['All', ...ALL_COMPANIES];
  el.innerHTML = companies.map(c => {
    const color = COMPANY_COLORS[c] || '#60a5fa';
    const isActive = selectedCompany === c;
    const style = isActive
      ? `background:${color}22; border-color:${color}; color:${color};`
      : '';
    return `<span class="chip ${isActive ? 'active' : ''}" style="${style}" onclick="selectCompany('${c}')">${escHtml(c)}</span>`;
  }).join('');
}

function renderBanner() {
  const el = document.getElementById('filterBanner');
  if (selectedCompany === 'All') {
    el.className = 'filter-banner';
    return;
  }
  // Count how many briefings have this company
  let count = 0;
  for (const b of BRIEFINGS) {
    if (b.items && b.items.some(i => i.company === selectedCompany)) count++;
  }
  el.className = 'filter-banner show';
  el.innerHTML = `Showing all <strong>${escHtml(selectedCompany)}</strong> news across ${count} briefing${count!==1?'s':''}. <a onclick="selectCompany('All')">Click All to return to daily view.</a>`;
}

function renderContent() {
  const el = document.getElementById('content');
  const sub = document.getElementById('mainSub');

  if (selectedCompany === 'All') {
    // Daily view
    const b = BRIEFINGS[selectedDateIdx];
    sub.textContent = fmtDate(b.date);
    if (!b.items || b.items.length === 0) {
      el.innerHTML = '<p class="no-news">No news items for this briefing.</p>';
      return;
    }
    // Group by company in order
    const seen = [];
    for (const item of b.items) {
      if (!seen.includes(item.company)) seen.push(item.company);
    }
    el.innerHTML = seen.map(company => {
      const companyItems = b.items.filter(i => i.company === company);
      const color = COMPANY_COLORS[company] || '#888';
      return `<div class="company-section">
        <div class="company-name"><span class="company-dot" style="background:${color}"></span>${escHtml(company)}</div>
        ${companyItems.map(item => renderItem(item)).join('')}
      </div>`;
    }).join('');
  } else {
    // Company filter mode — show all historical news for this company
    sub.textContent = `All ${selectedCompany} news`;
    const groups = [];
    for (const b of BRIEFINGS) {
      const items = (b.items || []).filter(i => i.company === selectedCompany);
      if (items.length > 0) {
        groups.push({ date: b.date, items });
      }
    }
    if (groups.length === 0) {
      el.innerHTML = `<p class="no-news">No news found for ${escHtml(selectedCompany)}.</p>`;
      return;
    }
    const color = COMPANY_COLORS[selectedCompany] || '#888';
    el.innerHTML = groups.map(g => `
      <div class="date-group">
        <div class="date-group-label">${escHtml(fmtDate(g.date))}</div>
        ${g.items.map(item => renderItem(item)).join('')}
      </div>
    `).join('');
  }
}

function renderItem(item) {
  const sourceHtml = item.sourceUrl
    ? `<div class="news-source"><a href="${escHtml(item.sourceUrl)}" target="_blank" rel="noopener">Source</a></div>`
    : '';
  const summaryHtml = item.summary
    ? `<div class="news-summary">${escHtml(item.summary)}</div>`
    : '';
  return `<div class="news-item">
    <div class="news-headline">${escHtml(item.headline)}</div>
    ${summaryHtml}
    ${sourceHtml}
  </div>`;
}

function selectDate(idx) {
  selectedDateIdx = idx;
  selectedCompany = 'All';
  render();
}

function selectCompany(company) {
  selectedCompany = company;
  render();
}

function render() {
  renderSidebar();
  renderChips();
  renderBanner();
  renderContent();
}

render();
</script>
</body>
</html>
