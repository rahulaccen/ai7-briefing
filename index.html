      {
        "company": "Databricks",
        "headline": "No major news today",
        "summary": "No significant product, funding, or partnership announcements from Databricks in the past 24 hours.",
        "sourceUrl": ""
      }
    ]
  }
];

let selectedDateIdx = 0;
let selectedCompany = null; // null = "All"

function fmtDate(isoStr) {
  const d = new Date(isoStr);
  return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric', timeZone: 'UTC' });
}

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function renderSidebar() {
  const el = document.getElementById('sidebarDates');
  el.innerHTML = '';
  BRIEFINGS.forEach((b, i) => {
    const div = document.createElement('div');
    div.className = 'date-item' + (i === selectedDateIdx && !selectedCompany ? ' active' : '') + (selectedCompany ? ' dimmed' : '');
    div.innerHTML = `<div class="date-label">${fmtDate(b.date)}</div><div class="date-count">${b.items.length} items</div>`;
    div.addEventListener('click', () => {
      selectedDateIdx = i;
      selectedCompany = null;
      render();
    });
    el.appendChild(div);
  });
}

function renderChips() {
  const el = document.getElementById('chips');
  el.innerHTML = '';
  // All chip
  const allChip = document.createElement('span');
  allChip.className = 'chip chip-all' + (!selectedCompany ? ' active' : '');
  allChip.textContent = 'All';
  allChip.addEventListener('click', () => { selectedCompany = null; render(); });
  el.appendChild(allChip);
  // Company chips
  COMPANIES.forEach(co => {
    const chip = document.createElement('span');
    const color = COMPANY_COLORS[co] || '#58a6ff';
    chip.className = 'chip' + (selectedCompany === co ? ' active' : '');
    if (selectedCompany === co) {
      chip.style.background = color;
      chip.style.borderColor = color;
    } else {
      chip.style.borderColor = hexToRgba(color, 0.4);
      chip.style.color = hexToRgba(color, 0.9);
    }
    chip.textContent = co;
    chip.addEventListener('click', () => { selectedCompany = co; render(); });
    el.appendChild(chip);
  });
}

function renderNewsItem(item) {
  const color = COMPANY_COLORS[item.company] || '#58a6ff';
  return `<div class="news-item">
    <div class="news-headline">${escHtml(item.headline)}</div>
    <div class="news-summary">${escHtml(item.summary)}</div>
    ${item.sourceUrl ? `<div class="news-source"><a href="${escHtml(item.sourceUrl)}" target="_blank" rel="noopener">Source ↗</a></div>` : ''}
  </div>`;
}

function escHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function groupByCompany(items) {
  const map = {};
  items.forEach(item => {
    if (!map[item.company]) map[item.company] = [];
    map[item.company].push(item);
  });
  return map;
}

function renderContent() {
  const contentEl = document.getElementById('content');
  const dateEl = document.getElementById('briefingDate');
  const countEl = document.getElementById('briefingCount');
  const bannerEl = document.getElementById('banner');

  if (!selectedCompany) {
    // Daily view
    bannerEl.classList.remove('visible');
    const b = BRIEFINGS[selectedDateIdx];
    dateEl.textContent = fmtDate(b.date);
    countEl.textContent = `${b.items.length} items`;

    const grouped = groupByCompany(b.items);
    let html = '';
    COMPANIES.forEach(co => {
      if (grouped[co] && grouped[co].length > 0) {
        const color = COMPANY_COLORS[co] || '#58a6ff';
        html += `<div class="company-section">`;
        html += `<div class="company-name" style="background:${hexToRgba(color,0.15)};color:${color}">${escHtml(co)}</div>`;
        grouped[co].forEach(item => { html += renderNewsItem(item); });
        html += `</div>`;
      }
    });
    // Any company not in our list
    Object.keys(grouped).forEach(co => {
      if (!COMPANIES.includes(co)) {
        const color = '#8b949e';
        html += `<div class="company-section">`;
        html += `<div class="company-name" style="background:rgba(139,148,158,0.15);color:${color}">${escHtml(co)}</div>`;
        grouped[co].forEach(item => { html += renderNewsItem(item); });
        html += `</div>`;
      }
    });
    if (!html) html = '<div class="empty">No news items for this date.</div>';
    contentEl.innerHTML = html;
  } else {
    // Company filter mode — show all historical items for this company
    dateEl.textContent = selectedCompany;
    const color = COMPANY_COLORS[selectedCompany] || '#58a6ff';

    const relevantBriefings = BRIEFINGS.filter(b => b.items.some(i => i.company === selectedCompany));
    const totalItems = relevantBriefings.reduce((acc, b) => acc + b.items.filter(i => i.company === selectedCompany).length, 0);

    countEl.textContent = `${totalItems} items across ${relevantBriefings.length} briefing${relevantBriefings.length !== 1 ? 's' : ''}`;
    bannerEl.classList.add('visible');
    bannerEl.innerHTML = `Showing all <span>${escHtml(selectedCompany)}</span> news across ${relevantBriefings.length} briefing${relevantBriefings.length !== 1 ? 's' : ''}. <a href="#" id="resetFilter">Click All to return to daily view.</a>`;
    document.getElementById('resetFilter').addEventListener('click', e => { e.preventDefault(); selectedCompany = null; render(); });

    let html = '';
    relevantBriefings.forEach(b => {
      const items = b.items.filter(i => i.company === selectedCompany);
      if (items.length === 0) return;
      html += `<div class="date-group">`;
      html += `<div class="date-group-header">${fmtDate(b.date)}</div>`;
      items.forEach(item => { html += renderNewsItem(item); });
      html += `</div>`;
    });
    if (!html) html = '<div class="empty">No news found for this company.</div>';
    contentEl.innerHTML = html;
  }
}

function render() {
  renderSidebar();
  renderChips();
  renderContent();
}

render();
</script>
</body>
</html>
