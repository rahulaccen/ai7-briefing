        "summary": "Mistral struck deals with Airbus and BMW to deploy AI across advanced manufacturing, with Airbus acquiring licenses for Mistral full product suite for on-premises and cloud deployment. This marks a major expansion into industrial AI.",
        "sourceUrl": "https://www.bloomberg.com/news/articles/2026-05-28/mistral-signs-airbus-and-bmw-as-it-brings-ai-to-manufacturing"
      },
      {
        "company": "Mistral",
        "headline": "BNP Paribas deepens Mistral partnership; new France data center announced",
        "summary": "BNP Paribas expanded its Mistral partnership to harden cybersecurity defenses against threats posed by next-generation AI models. Mistral also announced a new 10-megawatt data center in Les Ulis, France, due to open in H2 2026.",
        "sourceUrl": "https://www.reuters.com/business/finance/bnp-paribas-steps-up-mistral-partnership-bolster-rapid-ai-defences-2026-05-26/"
      },
      {
        "company": "Anthropic",
        "headline": "Anthropic confidentially files S-1 IPO prospectus at near-$1T valuation",
        "summary": "Anthropic filed a confidential draft S-1 with the SEC to begin its IPO process, days after closing a $65B Series H round at a $965B post-money valuation, surpassing OpenAI $852B March valuation. It is expected to be among 2026 most consequential public listings alongside SpaceX and OpenAI.",
        "sourceUrl": "https://www.anthropic.com/news/confidential-draft-s1-sec"

      {

        "summary": "CEO Sam Altman announced the revival of OpenAI Robotics, recruiting hardware, systems, and ML engineers to program and manufacture robots, a direct challenge to Tesla Optimus humanoid program and a pivot from pure software into physical AI.",
        "sourceUrl": "https://www.thenews.com.pk/latest/1404438-sam-altman-revives-openai-robotics-team-after-five-years"
      },
      {
        "company": "Databricks",
        "headline": "No major news today",
        "summary": "No significant product, funding, or partnership announcements from Databricks in the past 24 hours.",
        "sourceUrl": ""
      }
    ]
  }
];

const COMPANY_COLORS = {
  'Databricks': '#FF3621',
  'NVIDIA': '#76b900',
  'Snowflake': '#29B5E8',
  'Palantir': '#7B68EE',
  'Mistral': '#FA520F',
  'Anthropic': '#C96F1F',
  'OpenAI': '#10a37f'
};

let selectedBriefingId = BRIEFINGS[0]?.id;
let activeFilter = 'all';

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function renderSidebar() {
  const container = document.getElementById('sidebar-list');
  container.innerHTML = '';
  BRIEFINGS.forEach(b => {
    const div = document.createElement('div');
    div.className = 'sidebar-item' +
      (b.id === selectedBriefingId && activeFilter === 'all' ? ' active' : '') +
      (activeFilter !== 'all' ? ' dimmed' : '');
    div.innerHTML = `<div class="date-label">${b.displayDate}</div><div class="item-count">${b.items.length} items</div>`;
    div.onclick = () => selectBriefing(b.id);
    container.appendChild(div);
  });
}

function renderNews() {
  const container = document.getElementById('news-content');
  const banner = document.getElementById('filter-banner');
  container.innerHTML = '';

  if (activeFilter === 'all') {
    banner.classList.remove('visible');
    const briefing = BRIEFINGS.find(b => b.id === selectedBriefingId);
    if (!briefing) { container.innerHTML = '<div class="empty-state"><h3>No briefing selected</h3></div>'; return; }

    // Group by company
    const grouped = {};
    briefing.items.forEach(item => {
      if (!grouped[item.company]) grouped[item.company] = [];
      grouped[item.company].push(item);
    });

    const section = document.createElement('div');
    section.className = 'date-group';
    Object.entries(grouped).forEach(([company, items]) => {
      const color = COMPANY_COLORS[company] || '#8b949e';
      let html = `<div class="company-section">
        <div class="company-header">
          <div class="company-dot" style="background:${color}"></div>
          <div class="company-name">${escapeHtml(company)}</div>
        </div>`;
      items.forEach(item => {
        html += `<div class="news-item">
          <div class="news-headline">${escapeHtml(item.headline)}</div>
          <div class="news-summary">${escapeHtml(item.summary)}</div>
          ${item.sourceUrl ? `<a class="news-source" href="${escapeHtml(item.sourceUrl)}" target="_blank" rel="noopener">Source →</a>` : ''}
        </div>`;
      });
      html += '</div>';
      section.innerHTML += html;
    });
    container.appendChild(section);

  } else {
    // Company filter mode: show all historical items for this company
    const allItems = [];
    BRIEFINGS.forEach(b => {
      const companyItems = b.items.filter(i => i.company === activeFilter);
      if (companyItems.length > 0) {
        allItems.push({ displayDate: b.displayDate, date: b.date, items: companyItems });
      }
    });

    const totalItems = allItems.reduce((sum, g) => sum + g.items.length, 0);
    banner.innerHTML = `<strong>Showing all ${escapeHtml(activeFilter)} news across ${allItems.length} briefing${allItems.length !== 1 ? 's' : ''} (${totalItems} item${totalItems !== 1 ? 's' : ''}).</strong> Click <strong>All</strong> to return to daily view.`;
    banner.classList.add('visible');

    const color = COMPANY_COLORS[activeFilter] || '#8b949e';

    if (allItems.length === 0) {
      container.innerHTML = `<div class="empty-state"><h3>No news found for ${escapeHtml(activeFilter)}</h3><p>Check back after more briefings are published.</p></div>`;
      return;
    }

    allItems.forEach(group => {
      const dateGroup = document.createElement('div');
      dateGroup.className = 'date-group';
      let html = `<div class="date-group-header">${escapeHtml(group.displayDate)}</div>
        <div class="company-section">`;
      group.items.forEach(item => {
        html += `<div class="news-item">
          <div class="news-headline">${escapeHtml(item.headline)}</div>
          <div class="news-summary">${escapeHtml(item.summary)}</div>
          ${item.sourceUrl ? `<a class="news-source" href="${escapeHtml(item.sourceUrl)}" target="_blank" rel="noopener">Source →</a>` : ''}
        </div>`;
      });
      html += '</div>';
      dateGroup.innerHTML = html;
      container.appendChild(dateGroup);
    });
  }
}

function selectBriefing(id) {
  selectedBriefingId = id;
  activeFilter = 'all';
  updateChips();
  renderSidebar();
  renderNews();
}

function setFilter(company) {
  activeFilter = company;
  if (company === 'all') {
    // Reset to most recent briefing
    selectedBriefingId = BRIEFINGS[0]?.id;
  }
  updateChips();
  renderSidebar();
  renderNews();
}

function updateChips() {
  document.querySelectorAll('.filter-chip').forEach(chip => {
    const c = chip.dataset.company;
    chip.classList.toggle('active', c === activeFilter);
    if (c !== 'all' && c === activeFilter) {
      const color = COMPANY_COLORS[c] || '#8b949e';
      chip.style.background = color;
    } else if (c !== 'all') {
      chip.style.background = '';
    }
  });
}

// Init
renderSidebar();
renderNews();
</script>
</body>
</html>
