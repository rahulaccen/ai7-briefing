<style>
  :root {
    --bg: #0f0f13;
    --surface: #1a1a24;
    --surface2: #22222f;
    --border: #2e2e3e;
    --text: #e8e8f0;
    --text-muted: #888899;
    --accent: #7c6af7;
    --accent-hover: #9080ff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  header h1 {
    font-size: 1.25rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  header .badge {
    background: var(--accent);
    color: white;
    font-size: 0.65rem;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 20px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .layout {
    display: flex;
    height: calc(100vh - 57px);
  }

  .sidebar {
    width: 180px;
    min-width: 160px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 12px 0;
  }

  .sidebar-label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    padding: 4px 16px 8px;
  }

  .sidebar-item {
    padding: 10px 16px;
    font-size: 0.85rem;
    cursor: pointer;
    color: var(--text-muted);
    border-left: 3px solid transparent;
    transition: all 0.15s;
  }

  .sidebar-item:hover { color: var(--text); background: var(--surface2); }
  .sidebar-item.active { color: var(--accent); border-left-color: var(--accent); background: var(--surface2); }
  .sidebar-item.dimmed { opacity: 0.4; }

  .main {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    max-width: 900px;
  }

  .top-bar {
    margin-bottom: 20px;
  }

  .date-heading {
    font-size: 1.4rem;
    font-weight: 700;
    margin-bottom: 12px;
    color: var(--text);
  }

  .chips-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 8px;
  }

  .chip {
    background: var(--surface2);
    color: var(--text-muted);
    border: 1px solid var(--border);
    padding: 4px 14px;
    border-radius: 20px;
    font-size: 0.78rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }

  .chip:hover {
    border-color: var(--chip-color, var(--accent));
    color: var(--chip-color, var(--accent));
  }

  .chip.active {
    background: var(--chip-color, var(--accent));
    border-color: var(--chip-color, var(--accent));
    color: white;
  }

  .filter-banner {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
    font-size: 0.82rem;
    color: var(--text-muted);
    margin-bottom: 16px;
    display: none;
  }

  .filter-banner.visible { display: block; }

  .company-section {
    margin-bottom: 28px;
  }

  .date-group-header {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    padding: 4px 0 10px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 16px;
  }

  .company-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }

  .company-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .company-name {
    font-size: 0.95rem;
    font-weight: 700;
    letter-spacing: 0.02em;
    text-transform: uppercase;
  }

  .news-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 10px;
  }

  .news-item .headline {
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
    line-height: 1.4;
  }

  .news-item .summary {
    font-size: 0.84rem;
    color: #b0b0c4;
    line-height: 1.6;
  }

  .news-item .source-link {
    display: inline-block;
    margin-top: 8px;
    font-size: 0.75rem;
    color: var(--accent);
    text-decoration: none;
    font-weight: 500;
  }

  .news-item .source-link:hover { color: var(--accent-hover); text-decoration: underline; }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
    font-size: 0.9rem;
  }

  @media (max-width: 640px) {
    .sidebar { width: 140px; min-width: 120px; }
    .main { padding: 16px; }
    .date-heading { font-size: 1.1rem; }
  }

  @media (max-width: 480px) {
    .layout { flex-direction: column; }
    .sidebar { width: 100%; height: auto; border-right: none; border-bottom: 1px solid var(--border); display: flex; overflow-x: auto; padding: 8px 0; }
    .sidebar-item { white-space: nowrap; border-left: none; border-bottom: 3px solid transparent; }
    .sidebar-item.active { border-left-color: transparent; border-bottom-color: var(--accent); }
    .main { height: auto; }
  }
</style>
</head>

<script>
const BRIEFINGS = [{"id": "briefing-2026-06-09", "date": "2026-06-09T06:00:00.000Z", "items": [{"company": "Databricks", "headline": "Databricks Eyes $165\u2013175B Valuation in Fresh Funding Round Talks", "summary": "Databricks is in discussions to raise a new funding round that could begin as soon as July, at a valuation of $165B\u2013$175B \u2014 up from its last round at $134B. The company has hit a $5.4B annualized revenue run rate, up 65% year-over-year. With its Data + AI Summit kicking off June 15\u201318 in San Francisco, the timing signals confidence ahead of a likely future IPO.", "sourceUrl": "https://www.reuters.com/legal/transactional/databricks-talks-raise-funds-over-165-billion-information-reports-2026-06-09/"}, {"company": "NVIDIA", "headline": "Jensen Huang Declines Senate Testimony on AI and China Export Controls", "summary": "NVIDIA CEO Jensen Huang refused Sen. Elizabeth Warren's invitation to testify before the Senate Banking Committee's June 11 hearing on AI, China, and export controls. The refusal comes amid intensifying congressional scrutiny over Nvidia chip sales reaching Chinese entities. Separately, Nvidia and SK Group confirmed a cooperation plan with Vera CPUs using SK Hynix memory \u2014 Korea's chip stocks surged on the news.", "sourceUrl": "https://www.cnbc.com/2026/06/08/nvidia-jensen-huang-senate-elizabeth-warren-ai-china-export-controls.html"}, {"company": "OpenAI", "headline": "OpenAI Confidentially Files S-1 for IPO \u2014 Follows Anthropic in Race to Public Markets", "summary": "OpenAI announced Monday (June 8) it has confidentially filed a draft S-1 with the SEC, joining Anthropic as the second major AI lab to formally begin the IPO process in 2026. Sam Altman called this OpenAI's 'third phase' \u2014 making AI abundant and widely accessible. OpenAI is projecting $20B revenue in 2026 and $35B in 2027. The White House is still in talks about a potential government equity stake.", "sourceUrl": "https://techcrunch.com/2026/06/08/following-anthropic-openai-files-confidentially-for-ipo/"}, {"company": "Anthropic", "headline": "LG CNS Deploys Claude Enterprise Across All of LG Group", "summary": "LG CNS, the IT services arm of LG Group, has partnered with Anthropic to roll out Claude Enterprise across the entire LG Group conglomerate \u2014 covering electronics, chemicals, and home appliances units. The deal marks one of the largest single-enterprise Claude deployments in Asia and validates Anthropic's aggressive push into enterprise accounts ahead of its IPO.", "sourceUrl": "https://www.koreaherald.com/article/10767160"}, {"company": "Snowflake", "headline": "Stock Up ~38% After Q1 Beat; Analysts Raise Target to $281 as CoCo Drives Growth", "summary": "Snowflake's Q1 FY27 revenue hit $1.39B (34% YoY growth, 5% beat vs. $1.32B estimates), triggering a ~38% stock surge \u2014 the company's strongest post-earnings rally in years. Analysts have raised price targets to $281, citing CoCo (enterprise AI coding agent) and CoWork (knowledge worker agent) as primary growth accelerants. The Natoma acquisition (MCP gateway for agentic AI governance) was confirmed at Summit 2026.", "sourceUrl": "https://www.tikr.com/blog/snowflake-stock-analysis-2026-coco-acceleration-6-billion-aws-deal-and-a-677-target"}, {"company": "Palantir", "headline": "UK NHS Controversy Deepens \u2014 Health Campaigners Target Palantir Links During Bidding", "summary": "UK health campaigners are escalating pressure on the government over official ties to Palantir during the NHS Federated Data Platform procurement process. The criticism follows a parliamentary committee's call to invoke the break clause on the \u00a3330M contract, citing data sovereignty concerns. Palantir's UK government business remains politically exposed even as U.S. commercial revenue surged 133% YoY in Q1.", "sourceUrl": "https://news.bloomberglaw.com/business-and-practice/kirkland-palantir-launch-ai-tool-targeting-fund-formation-work"}, {"company": "Mistral", "headline": "CEO Warns Europe Could Become US 'Vassal State' in AI Within 2 Years", "summary": "Mistral CEO Arthur Mensch told CNBC that without sovereign AI infrastructure, Europe risks full dependence on US AI platforms within two years. Mistral, valued at $14B, is building 1 GW of AI compute by 2029 and actively courting Wall Street banks and Asian enterprises as the key non-US frontier model provider. Mensch positioned AI infrastructure access as the defining geopolitical competition of the decade.", "sourceUrl": "https://www.cnbc.com/video/2026/06/03/mistral-ceo-on-ai-infrastructure-sovereignty-and-europes-ai-future.html"}]}, {"id": "briefing-2026-06-08", "date": "2026-06-08T06:00:00.000Z", "items": [{"company": "NVIDIA", "headline": "Jensen Huang's Korea Tour \u2014 GW-Scale AI Factory Deal with Naver, Vera Chip on SK Hynix Memory", "summary": "On a high-profile 5-day South Korea visit (June 5\u201310), Jensen Huang met with Samsung, SK, LG, Hyundai, and Naver leadership. The headline deal: Nvidia and Naver will co-build a gigawatt-scale AI factory using the Nvidia DSX platform, starting with 55MW in 2027 and scaling to 200MW by 2028 \u2014 roughly 4\u00d7 Naver's largest data center. Separately, Huang confirmed Nvidia's next-gen Vera chip will use SK Hynix memory, boosting Korean semiconductor stocks.", "sourceUrl": "https://www.asiae.co.kr/en/article/2026060809443449390"}, {"company": "NVIDIA", "headline": "Nvidia Launches Nemotron Alliance \u2014 12-Company Open-AI Coalition Including Mistral, Cursor, Perplexity", "summary": "Nvidia unveiled the Nemotron Alliance, a 12-company coalition co-developing open AI foundation models on Nvidia's Nemotron framework. Participants include Mistral AI, Cursor, and Perplexity. Naver became the first Korean company to join, contributing pre-training and reinforcement learning capabilities to boost its HyperCLOVA X model.", "sourceUrl": "https://www.asiae.co.kr/en/article/2026060809443449390"}, {"company": "OpenAI", "headline": "ChatGPT to Become a \"Superapp\" \u2014 Coding, Agents, and Automation in One Interface", "summary": "OpenAI will overhaul ChatGPT within weeks, bundling Codex (coding), AI agents, image generation, and automation into a single platform. A senior employee declared \"Chat is dead.\" The pivot targets enterprise users and profitability ahead of IPO, officially ending side projects like Sora.", "sourceUrl": "https://techcrunch.com/2026/06/07/openai-is-still-working-on-that-super-app/"}, {"company": "OpenAI", "headline": "Trump Administration in Talks to Take an Equity Stake in OpenAI", "summary": "The US government is in active discussions to acquire an equity position in OpenAI \u2014 an unprecedented move that would give Washington a direct financial interest in one of the world's leading AI labs. No deal terms have been disclosed, but the talks signal deeper alignment between the Trump administration and OpenAI on AI policy and national competitiveness.", "sourceUrl": "https://techcrunch.com/2026/06/06/the-trump-administration-might-take-an-equity-stake-in-openai/"}, {"company": "Anthropic", "headline": "Confidential IPO Filed \u2014 $47B Annualized Revenue, 4.7\u00d7 Growth in 12 Months", "summary": "Anthropic filed a confidential US IPO on June 1, 2026 \u2014 the first major AI lab to move toward a public listing. Annualized revenue hit $47B in May 2026, up from ~$10B a year prior (4.7\u00d7 growth). Valuation range: $60B\u2013$380B. Anthropic is betting its safety-first positioning will command a premium.", "sourceUrl": "https://medium.com/ai-in-plain-english/the-ipo-race-is-on-ai-intelligence-briefing-week-of-june-7-2026-43d0519c8a75"}, {"company": "Anthropic", "headline": "Claude Mythos Preview Now in Hands of Select Partners via Project Glasswing", "summary": "Anthropic is granting enterprise security firms early access to 'Claude Mythos Preview' \u2014 its next-gen frontier model \u2014 through Project Glasswing, designed to harden critical software against AI-accelerated cyberattacks. Cohesity (trusted by 70%+ of Fortune Global 500) and Intercontinental Exchange (NYSE owner) are among the first participants.", "sourceUrl": "https://scitechanddigital.news/2026/06/08/cohesity-gains-access-to-anthropics-claude-mythos-preview-through-project-glasswing/"}, {"company": "Palantir", "headline": "Partners with Google Cloud \u2014 Marketplace Distribution, BigQuery & Gemini Integrations at AIPCon 10", "summary": "Palantir announced a multiyear partnership with Google Cloud at AIPCon 10, including Google Cloud Marketplace distribution and deep integrations with BigQuery and Gemini models. New enterprise deployments announced at Kirkland & Ellis (legal AI), GNP Seguros (first major Mexican customer in insurance), and McCarthy Building (construction). PLTR stock at ~$135.53, P/E ~142.", "sourceUrl": "https://finance.yahoo.com/markets/stocks/articles/palantir-google-cloud-tie-enterprise-090809703.html"}, {"company": "Snowflake", "headline": "Summit 2026 \u2014 CoCo, CoWork, and Horizon Context Launch a Full Agentic Enterprise Stack", "summary": "Snowflake used Summit 2026 to launch three layers: CoCo (Cortex Code, for developers), CoWork (for business users \u2014 natural-language data access, deep research, collaborative artifacts), and Horizon Context (enterprise intelligence back end collecting and enriching metadata across all connected systems). The combined stack directly challenges Microsoft, Google, Databricks, and OpenAI for the agentic enterprise.", "sourceUrl": "https://siliconangle.com/2026/06/07/snowflake-databricks-model-makers-battle-agentic-client-ai-back-end/"}, {"company": "Databricks", "headline": "CEO Ali Ghodsi: 2026 Is \"A Terrible Year to Go Public\" \u2014 No IPO This Year", "summary": "Databricks CEO confirmed the company will not IPO in 2026, calling it 'a terrible year to go public' as OpenAI, Anthropic, and SpaceX are expected to collectively absorb $200B+ in IPO capital. Databricks, valued at $134B, will wait for better conditions. Data + AI Summit runs June 15\u201318 in San Francisco; Genie's paid tier launches July 6.", "sourceUrl": "https://thenextweb.com/news/databricks-ceo-calls-2026-a-terrible-year-to-go-public-as-spacex-anthropic-and-openai-prepare-to-absorb-200-billion-in-ipo-capital"}, {"company": "Mistral", "headline": "CEO: \"Demand Is Way Above Supply\" as Enterprise AI Adoption Surges in 2026", "summary": "Mistral CEO Arthur Mensch says AI infrastructure demand in 2026 has outpaced the company's supply capacity, echoing broader industry compute constraint signals. Mistral joined NVIDIA's Nemotron Alliance (see NVIDIA), gaining access to Nvidia's open model framework for enterprise deployment. Mistral also announced a premium technology sponsorship of Team Visma | Lease a Bike (pro cycling).", "sourceUrl": "https://www.instagram.com/reel/DZTMHVjjROf/"}]}, {"id": "briefing-2026-06-07", "date": "2026-06-07T06:03:11.000Z", "items": [{"company": "NVIDIA", "headline": "RTX Spark PC Chip Unveiled at Computex 2026", "summary": "Jensen Huang announced the RTX Spark at Computex 2026 in Taipei \u2014 a new AI-focused PC chip built in partnership with Microsoft to bring AI inference directly to personal computers. Marks NVIDIA's aggressive push into the consumer AI PC market beyond data centers.", "sourceUrl": "https://www.nvidia.com/en-us/geforce/news/computex-2026-nvidia-geforce-rtx-announcements/"}, {"company": "Anthropic", "headline": "Anthropic Files Confidential S-1 with SEC, Eyes Q4 2026 IPO", "summary": "On June 1, Anthropic confidentially submitted a draft S-1 to the SEC, targeting a Q4 2026 IPO. The filing follows a $65B funding round valuing the company at ~$965B. Annualized revenue is expected to reach ~$50B by end of June 2026.", "sourceUrl": "https://www.cnbc.com/2026/06/01/anthropic-ipo-s1-prospectus.html"}, {"company": "Anthropic", "headline": "Anthropic Warns of Recursive Self-Improvement, Calls for Industry-Wide AI Pause", "summary": "In a June 4 report titled 'When AI Builds Itself,' Anthropic warned AI is approaching a threshold where systems could autonomously design more capable successors. Co-founder Dario Amodei said the risk 'could come sooner than most institutions are prepared for' and proposed a coordinated global pause mechanism among top AI labs.", "sourceUrl": "https://www.dawn.com/news/2005635"}, {"company": "OpenAI", "headline": "OpenAI Plans ChatGPT 'Superapp' Overhaul \u2014 Biggest Redesign Since Launch", "summary": "OpenAI is recasting ChatGPT as a 'superapp' with coding tools, AI agents, and partner services in its most ambitious redesign yet. Pre-IPO move designed to drive higher-margin revenue. ChatGPT handles 70% of all AI assistant activity; OpenAI projects $20B revenue in 2026 and $35B in 2027.", "sourceUrl": "https://www.reuters.com/business/openai-plans-chatgpt-superapp-overhaul-ahead-listing-ft-reports-2026-06-07/"}, {"company": "OpenAI", "headline": "Trump Administration in Talks for US Government Equity Stake in OpenAI", "summary": "The Trump administration is negotiating with OpenAI over a US government equity stake, potentially via a 'Public Wealth Fund.' Trump plans meetings with AI companies on a partnership plan; Bernie Sanders is pushing for 50% public ownership. Sam Altman reportedly first floated the concept in early 2025.", "sourceUrl": "https://thenextweb.com/news/trump-wants-the-american-public-to-own-a-piece-of-openai-nobody-knows-how-that-would-work"}, {"company": "Snowflake", "headline": "Snowflake Summit 2026: 26+ New AI Capabilities and Open Interoperability Framework", "summary": "At Summit 2026 (June 1\u20134, Moscone Center, SF, 20,000+ attendees), Snowflake launched 26+ new product capabilities including CoWork AI agents and a pioneering open framework for interoperable enterprise data and AI. The headline message: enterprise data must be agentic-ready \u2014 a direct competitive shot at Databricks and Microsoft Fabric.", "sourceUrl": "https://atlan.com/know/snowflake/summit-2026-announcements/"}, {"company": "Palantir", "headline": "UK MPs Demand Government Exit \u00a3330M Palantir NHS Contract", "summary": "A UK parliamentary committee called Palantir's role in public services an 'unacceptable weakness' and 'clear mismatch with UK values,' urging the government to invoke a break clause to exit its \u00a3330M ($444M) NHS Federated Data Platform contract signed in 2023. Controversy centres on data sovereignty concerns.", "sourceUrl": "https://www.theregister.com/software/2026/06/03/uk-lawmakers-call-on-government-to-ditch-palantir-nhs-contract/5250150"}, {"company": "Mistral", "headline": "Mistral Signs TCS and Airbus Deals; Targets US Enterprise Market", "summary": "Mistral AI inked two major partnerships: a strategic deal with TCS to build/deploy custom AI models via Mistral Forge, and a multi-year agreement with Airbus covering civil and defence AI under strict data sovereignty controls. Fresh off its Paris AI Now Summit, Mistral is now actively pitching Wall Street banks and US enterprises.", "sourceUrl": "https://www.bankinfosecurity.com/tcs-mistral-ai-sign-strategic-partnership-a-31835"}, {"company": "Databricks", "headline": "Databricks CEO: 2026 Is 'A Terrible Year to Go Public'", "summary": "CEO Ali Ghodsi said the $134B company will skip 2026 IPOs, citing concern that SpaceX, Anthropic, and OpenAI listings will absorb $200B+ in public capital. Separately, Databricks announced its 2026 Data + AI Summit keynote lineup (Chicago, June 8\u201310) \u2014 the world's largest data and AI conference.", "sourceUrl": "https://thenextweb.com/news/databricks-ceo-calls-2026-a-terrible-year-to-go-public-as-spacex-anthropic-and-openai-prepare-to-absorb-200-billion-in-ipo-capital"}]}, {"id": "briefing-2026-06-06", "date": "2026-06-06T16:00:00.000Z", "items": [{"company": "NVIDIA", "headline": "RTX Spark Superchip unveiled at Computex 2026", "summary": "Jensen Huang unveiled the RTX Spark \u2014 an Arm CPU + Blackwell GPU package with 1 petaflop of AI compute and 128GB unified memory \u2014 designed to turn Windows PCs into an 'agentic AI OS.' Built with Microsoft, it targets Apple Silicon, Intel, and Qualcomm at a ~$5K price point.", "sourceUrl": "https://nvidianews.nvidia.com/news/nvidia-microsoft-windows-pcs-agents-rtx-spark"}, {"company": "NVIDIA", "headline": "$1.3 trillion wiped from chip stocks in single-day selloff", "summary": "On June 5, AI chipmakers including Nvidia lost ~$1.3T in combined market value in a sharp selloff \u2014 one of the largest single-day sector losses on record.", "sourceUrl": "https://www.reuters.com/business/media-telecom/chip-selloff-erases-over-1-trillion-stock-market-value-2026-06-05/"}, {"company": "Snowflake", "headline": "Snowflake Summit 2026 draws 20,000+ with agentic AI focus", "summary": "CEO Sridhar Ramaswamy keynoted on 'making AI real for business' through agentic intelligence in San Francisco. Product launches centered on eliminating enterprise data complexity and turning data into autonomous action.", "sourceUrl": "https://diginomica.com/snowflake-summit-2026-quality-products-will-win-out-ai-revolutionizes-very-nature-information-work"}, {"company": "Snowflake", "headline": "Open Interoperability Framework launched for enterprise data and AI", "summary": "Snowflake announced support for Apache Iceberg v3, Snowflake Storage, and Horizon Catalog \u2014 an open framework to eliminate data fragmentation across enterprise AI stacks.", "sourceUrl": "https://www.snowflake.com/en/news/press-releases/snowflake-pioneers-new-open-framework-for-interoperable-enterprise-data-and-ai/"}, {"company": "Palantir", "headline": "Kirkland & Ellis deploys Palantir AI for private equity fundraising", "summary": "Top law firm Kirkland & Ellis partnered with Palantir on an exclusive AI-powered fund enterprise platform to transform PE fundraising workflows \u2014 a significant beachhead into the $10T private equity industry.", "sourceUrl": "https://www.k -steps-up-mistral-partnership-bolster-rapid-ai-defences-2026-05-26/"}, {"company": "Anthropic", "headline": "Anthropic confidentially files S-1 IPO prospectus at near-$1T valuation", "summary": "Anthropic filed a confidential draft S-1 with the SEC, days after closing a $65B Series H round at a $965B valuation \u2014 surpassing OpenAI's $852B March valuation.", "sourceUrl": "https://www.anthropic.com/news/confidential-draft-s1-sec"}, {"company": "OpenAI", "headline": "OpenAI revives robotics team, hiring to build and manufacture robots", "summary": "CEO Sam Altman announced the revival of OpenAI Robotics, recruiting hardware and ML engineers to program and manufacture robots \u2014 a direct challenge to Tesla Optimus.", "sourceUrl": "https://www.thenews.com.pk/latest/1404438-sam-altman-revives-openai-robotics-team-after-five-years"}, {"company": "Databricks", "headline": "No major news today", "summary": "No significant product, funding, or partnership announcements from Databricks in the past 24 hours.", "sourceUrl": ""}]}];

const COMPANY_COLORS = {"Databricks": "#FF4B4B", "NVIDIA": "#76B900", "Snowflake": "#29B5E8", "Palantir": "#A855F7", "Mistral": "#F97316", "Anthropic": "#F59E0B", "OpenAI": "#10B981"};
const COMPANIES = ["Databricks", "NVIDIA", "Snowflake", "Palantir", "Mistral", "Anthropic", "OpenAI"];

let currentBriefingId = BRIEFINGS[0].id;
let currentCompany = 'All';

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderNewsItem(item) {
  const sourceLink = item.sourceUrl
    ? `<a href="${escapeHtml(item.sourceUrl)}" class="source-link" target="_blank" rel="noopener">Source ↗</a>`
    : '';
  return `
    <div class="news-item">
      <div class="headline">${escapeHtml(item.headline)}</div>
      <div class="summary">${escapeHtml(item.summary)}</div>
      ${sourceLink}
    </div>`;
}

function renderDailyView(briefingId) {
  const briefing = BRIEFINGS.find(b => b.id === briefingId);
  if (!briefing) return '<div class="empty-state">No briefing found.</div>';

  const dateObj = new Date(briefing.date);
  const dateStr = dateObj.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
  document.getElementById('dateHeading').textContent = dateStr;

  // Group by company
  const byCompany = {};
  briefing.items.forEach(item => {
    if (!byCompany[item.company]) byCompany[item.company] = [];
    byCompany[item.company].push(item);
  });

  // Render in COMPANIES order
  let html = '';
  const presentCompanies = COMPANIES.filter(c => byCompany[c]);
  const otherCompanies = Object.keys(byCompany).filter(c => !COMPANIES.includes(c));
  const allCompanies = [...presentCompanies, ...otherCompanies];

  allCompanies.forEach(company => {
    const items = byCompany[company];
    const color = COMPANY_COLORS[company] || '#888';
    html += `
      <div class="company-section">
        <div class="company-header">
          <div class="company-dot" style="background:${color}"></div>
          <div class="company-name" style="color:${color}">${escapeHtml(company)}</div>
        </div>`;
    items.forEach(item => { html += renderNewsItem(item); });
    html += '</div>';
  });

  return html || '<div class="empty-state">No news items for this date.</div>';
}

function renderCompanyView(company) {
  document.getElementById('dateHeading').textContent = company;
  const color = COMPANY_COLORS[company] || '#888';

  let html = '';
  let totalItems = 0;

  BRIEFINGS.forEach(briefing => {
    const items = briefing.items.filter(item => item.company === company);
    if (items.length === 0) return;
    totalItems += items.length;

    const dateObj = new Date(briefing.date);
    const dateStr = dateObj.toLocaleDateString('en-US', { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' });

    html += `<div class="date-group-header">${dateStr}</div>`;
    items.forEach(item => { html += renderNewsItem(item); });
  });

  const count = BRIEFINGS.filter(b => b.items.some(i => i.company === company)).length;
  const banner = document.getElementById('filterBanner');
  banner.className = 'filter-banner visible';
  banner.innerHTML = `Showing all <strong style="color:${color}">${company}</strong> news across ${count} briefing${count !== 1 ? 's' : ''} (${totalItems} item${totalItems !== 1 ? 's' : ''}). <a href="#" onclick="selectCompany('All', document.querySelector('.chip[data-company=All]')); return false;" style="color:var(--accent)">Click All to return to daily view.</a>`;

  return html || `<div class="empty-state">No ${company} news found in any briefings.</div>`;
}

function selectDate(briefingId) {
  if (currentCompany !== 'All') return; // In company mode, clicks are ignored
  currentBriefingId = briefingId;

  document.querySelectorAll('.sidebar-item').forEach(el => {
    el.classList.toggle('active', el.dataset.briefingId === briefingId);
    el.classList.remove('dimmed');
  });

  document.getElementById('content').innerHTML = renderDailyView(briefingId);
}

function selectCompany(company, chipEl) {
  currentCompany = company;

  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  if (chipEl) chipEl.classList.add('active');

  const banner = document.getElementById('filterBanner');

  if (company === 'All') {
    banner.className = 'filter-banner';
    document.querySelectorAll('.sidebar-item').forEach(el => {
      el.classList.remove('dimmed');
      el.classList.toggle('active', el.dataset.briefingId === currentBriefingId);
    });
    document.getElementById('content').innerHTML = renderDailyView(currentBriefingId);
  } else {
    document.querySelectorAll('.sidebar-item').forEach(el => {
      el.classList.remove('active');
      el.classList.add('dimmed');
    });
    document.getElementById('content').innerHTML = renderCompanyView(company);
  }
}

// Initialize
document.getElementById('content').innerHTML = renderDailyView(currentBriefingId);
const firstBriefing = BRIEFINGS[0];
const dateObj = new Date(firstBriefing.date);
document.getElementById('dateHeading').textContent = dateObj.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
</script>
